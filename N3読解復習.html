<style>

.option-btn:hover{border-color:#4361ee}
.option-btn.correct{border-color:#06d6a0;background:#d4edda}
.option-btn.wrong{border-color:#ef476f;background:#fde8ec}
.result-correct{background:#d4edda;border:2px solid #06d6a0;border-radius:12px;padding:16px;margin:12px 0}
.result-wrong{background:#fde8ec;border:2px solid #ef476f;border-radius:12px;padding:16px;margin:12px 0}

.explanation strong{color:#4361ee}
.passage{font-size:.95rem;line-height:2;padding:16px;background:#fafbff;border:1px solid #e8ecff;border-radius:12px;margin:12px 0}
.timer{font-size:1rem;color:#ef476f;font-weight:700;text-align:right}
.progress-bar{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#4361ee,#06d6a0);border-radius:3px;transition:width .3s}
.stats-bar{display:flex;justify-content:space-around;padding:12px;background:#f8f9ff;border-radius:12px;margin-bottom:12px}
.stats-bar .stat{text-align:center}
.stats-bar .stat-num{font-size:1.2rem;font-weight:700;color:#4361ee}
.stats-bar .stat-label{font-size:.7rem;color:#888}
.list-item{padding:14px;border:2px solid #e0e0e0;border-radius:12px;margin:8px 0;cursor:pointer;transition:.2s}
.list-item:hover{border-color:#4361ee;background:#f8f9ff}
.list-item.done{border-color:#06d6a0;background:#f0fff4}
ruby{ruby-position:over}rt{font-size:.6em;color:#888}

/* Sync modal */
.sync-btn{position:fixed;bottom:16px;right:16px;width:48px;height:48px;border-radius:50%;background:#4361ee;color:#fff;border:none;font-size:22px;box-shadow:0 2px 12px rgba(67,97,238,.4);z-index:999;cursor:pointer}
.sync-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.sync-modal.show{display:flex}
.sync-box{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:360px;max-height:80vh;overflow-y:auto}
.sync-box h3{margin-bottom:16px;font-size:16px}
.sync-box textarea{width:100%;height:120px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:12px;margin:8px 0}
.sync-box .btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin:6px 0}
.sync-box .btn-export{background:#4361ee;color:#fff}
.sync-box .btn-import{background:#2ec4b6;color:#fff}
.sync-box .btn-close{background:#eee;color:#333}
.sync-msg{text-align:center;padding:8px;font-size:13px;color:#2ec4b6;display:none}
</style>
</head>

var st = JSON.parse(localStorage.getItem('n3_reading_state') || '{}');
if (!st.correct) st.correct = 0;
if (!st.wrong) st.wrong = 0;
if (!st.done) st.done = {};
function saveSt() { localStorage.setItem('n3_reading_state', JSON.stringify(st)); }

var app = document.getElementById('app');
var timerInterval = null;
var timerSeconds = 0;

function renderHome() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  var doneCount = Object.keys(st.done).length;
  var total = st.correct + st.wrong;
  var rate = total ? Math.round(st.correct/total*100) : 0;
  var html = '<div class="card"><h2>📊 <ruby>学習<rt>がくしゅう</rt></ruby>データ</h2>'+
    '<div class="stats-bar"><div class="stat"><div class="stat-num">'+st.correct+'</div><div class="stat-label">正解</div></div>'+
    '<div class="stat"><div class="stat-num">'+st.wrong+'</div><div class="stat-label">不正解</div></div>'+
    '<div class="stat"><div class="stat-num">'+rate+'%</div><div class="stat-label">正答率</div></div>'+
    '<div class="stat"><div class="stat-num">'+doneCount+'/15</div><div class="stat-label">完了</div></div></div>'+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+Math.round(doneCount/15*100)+'%"></div></div></div>';
  html += '<div class="card"><h2>📄 <ruby>文章<rt>ぶんしょう</rt></ruby>リスト</h2>';
  PASSAGES.forEach(function(p){
    var done = st.done[p.id];
    html += '<div class="list-item'+(done?' done':'')+'" onclick="startPassage('+p.id+')">'+
      '<div style="display:flex;justify-content:space-between"><strong>'+p.id+'. '+p.title+'</strong>'+(done?'<span style="color:#06d6a0">✅</span>':'')+'</div></div>';
  });
  html += '</div>';
  app.innerHTML = html;
}

var currentPassage = null;
var currentQIdx = 0;
var qAnswered = false;

function startPassage(id) {
  currentPassage = PASSAGES.find(function(p){return p.id===id;});
  currentQIdx = 0;
  qAnswered = false;
  timerSeconds = 0;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function(){
    timerSeconds++;
    var el = document.getElementById('timer');
    if (el) el.textContent = formatTime(timerSeconds);
  }, 1000);
  renderPassageQ();
}

function formatTime(s) {
  var m = Math.floor(s/60);
  var sec = s%60;
  return (m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;
}

function renderPassageQ() {
  qAnswered = false;
  var p = currentPassage;
  var q = p.questions[currentQIdx];
  var html = '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center">'+
    '<button class="btn btn-secondary" onclick="renderHome()" style="padding:6px 12px;font-size:.8rem">← 戻る</button>'+
    '<div class="timer" id="timer">'+formatTime(timerSeconds)+'</div></div>'+
    '<h2 style="margin-top:8px">'+p.id+'. '+p.title+'</h2>'+
    '<div class="passage">'+p.text+'</div>'+
    '<p style="font-size:.8rem;color:#888;margin-bottom:4px">問題 '+(currentQIdx+1)+' / '+p.questions.length+'</p>'+
    '<p style="font-size:1rem;font-weight:600;margin:8px 0">'+q.q+'</p>';
  html += '<div id="options">';
  q.opts.forEach(function(o,i){
    html += '<button class="option-btn" onclick="checkReading('+i+','+q.answer+')" data-idx="'+i+'">'+String.fromCharCode(65+i)+'．'+o+'</button>';
  });
  html += '</div><div id="result"></div></div>';
  app.innerHTML = html;
}

function checkReading(sel, correct) {
  if (qAnswered) return;
  qAnswered = true;
  var btns = document.querySelectorAll('#options .option-btn');
  btns[correct].classList.add('correct');
  if (sel !== correct) btns[sel].classList.add('wrong');
  var isCorrect = sel === correct;
  if (isCorrect) st.correct++; else st.wrong++;
  saveSt();
  var q = currentPassage.questions[currentQIdx];
  var html = '<div class="'+(isCorrect?'result-correct':'result-wrong')+'">'+
    (isCorrect?'✅ 正解！':'❌ 不正解…')+'</div>'+
    '<div class="explanation">'+q.explain+'</div>';
  if (currentQIdx < currentPassage.questions.length - 1) {
    html += '<button class="btn btn-primary btn-block" onclick="currentQIdx++;renderPassageQ()" style="margin-top:12px">次の問題 →</button>';
  } else {
    st.done[currentPassage.id] = true;
    saveSt();
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    html += '<div style="text-align:center;margin-top:12px;color:#06d6a0;font-weight:700">🎉 この文章を完了しました！（'+formatTime(timerSeconds)+'）</div>';
    html += '<button class="btn btn-primary btn-block" onclick="renderHome()" style="margin-top:12px">文章リストへ →</button>';
  }
  document.getElementById('result').innerHTML = html;
}

renderHome();

// ============ 跨设备同步 ============
function exportData() {
  const keys = Object.keys(localStorage);
  const data = {};
  keys.forEach(k => { try { data[k] = JSON.parse(localStorage.getItem(k)); } catch(e) { data[k] = localStorage.getItem(k); } });
  const json = JSON.stringify(data);
  const ta = document.getElementById('syncData');
  ta.value = json;
  ta.select();
  try { navigator.clipboard.writeText(json); showSyncMsg('✅ 已复制到剪贴板！粘贴到另一台设备导入即可'); } 
  catch(e) { showSyncMsg('⬆️ 请手动全选复制上面的文本'); }
}
function importData() {
  const raw = document.getElementById('syncData').value.trim();
  if (!raw) { showSyncMsg('❌ 请先粘贴数据'); return; }
  try {
    const data = JSON.parse(raw);
    let count = 0;
    for (const [k, v] of Object.entries(data)) {
      localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v));
      count++;
    }
    showSyncMsg('✅ 导入成功！共 ' + count + ' 条数据，刷新页面生效');
    setTimeout(() => location.reload(), 1500);
  } catch(e) { showSyncMsg('❌ 数据格式错误，请检查'); }
}
function showSyncMsg(msg) {
  const el = document.getElementById('syncMsg');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}
