<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta name="google" content="notranslate">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N2速読トレーニング</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 16px; }
.header { text-align: center; padding: 20px 0; }
.header h1 { font-size: 24px; color: #1a1a2e; }
.header .sub { color: #666; margin-top: 8px; font-size: 14px; }
.stats { display: flex; justify-content: space-around; background: white; border-radius: 12px; padding: 16px; margin: 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.stat { text-align: center; }
.stat .num { font-size: 24px; font-weight: bold; color: #4361ee; }
.stat .label { font-size: 12px; color: #666; margin-top: 4px; }
.tabs { display: flex; gap: 8px; margin: 16px 0; overflow-x: auto; padding-bottom: 4px; }
.tab { padding: 10px 14px; border-radius: 20px; border: none; background: white; color: #333; font-size: 13px; cursor: pointer; white-space: nowrap; box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: all 0.2s; }
.tab.active { background: #4361ee; color: white; }
.card { background: white; border-radius: 16px; padding: 24px; margin: 16px 0; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.progress-bar { height: 6px; background: #e9ecef; border-radius: 3px; margin: 12px 0; }
.progress-bar .fill { height: 100%; background: #4361ee; border-radius: 3px; transition: width 0.3s; }
.btn { padding: 12px 24px; border-radius: 10px; border: none; font-size: 15px; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: #4361ee; color: white; }
.btn-primary:hover { background: #3651d4; }
.btn-success { background: #2ec4b6; color: white; }
.btn-danger { background: #e63946; color: white; }
.btn-outline { background: white; border: 2px solid #4361ee; color: #4361ee; }
.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.quiz-option { padding: 14px 18px; border: 2px solid #e9ecef; border-radius: 10px; cursor: pointer; text-align: left; font-size: 15px; transition: all 0.2s; line-height: 1.6; }
.quiz-option:hover { border-color: #4361ee; background: #f0f3ff; }
.quiz-option.correct { border-color: #2ec4b6; background: #e8faf8; }
.quiz-option.wrong { border-color: #e63946; background: #fde8ea; }
.quiz-option.disabled { pointer-events: none; }
.hidden { display: none; }
.passage { font-size: 15px; line-height: 2.2; padding: 16px; background: #f8f9fa; border-radius: 10px; margin: 12px 0; }
.timer { text-align: center; font-size: 28px; font-weight: bold; color: #e63946; margin: 12px 0; font-variant-numeric: tabular-nums; }
.timer.running { animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.6;} }
.explain { margin-top: 16px; padding: 14px; background: #f8f9fa; border-radius: 10px; font-size: 14px; line-height: 1.8; border-left: 4px solid #4361ee; }
.counter { text-align: center; font-size: 13px; color: #666; margin: 8px 0; }
.topic-tag { display: inline-block; padding: 4px 10px; background: #e3f2fd; color: #1565c0; border-radius: 4px; font-size: 12px; margin: 4px; }
.result-banner { text-align: center; padding: 16px; border-radius: 10px; margin: 12px 0; }
.result-banner.good { background: #e8faf8; color: #2ec4b6; }
.result-banner.bad { background: #fde8ea; color: #e63946; }
ruby rt { font-size: 0.6em; color: #4361ee; }
.vocab-popup { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 100; max-width: 300px; }
.article-list { list-style: none; }
.article-list li { padding: 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.2s; }
.article-list li:hover { background: #f0f3ff; }

/* Sync modal */
.sync-btn{position:fixed;bottom:16px;right:16px;width:48px;height:48px;border-radius:50%;background:#4361ee;color:#fff;border:none;font-size:22px;box-shadow:0 2px 12px rgba(67,97,238,.4);z-index:999;cursor:pointer}
.sync-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.sync-modal.show{display:flex}
.sync-box{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:360px;max-height:80vh;overflow-y:auto}
.sync-box h3{margin-bottom:16px;font-size:16px}
.sync-box textarea{width:100%;height:120px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:12px;margin:8px 0}
.sync-box .btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin:6px 0}
.sync-box .btn-export{background:#4361ee;color:#fff}
.sync-box .btn-import{background:#2ec4b6;color:#fff}
.sync-box .btn-close{background:#eee;color:#333}
.sync-msg{text-align:center;padding:8px;font-size:13px;color:#2ec4b6;display:none}
</style>
</head>
<body>
<div class="app">
<div class="header">
<h1>📖 N2速読トレーニング</h1>
<div class="sub" id="subInfo">読解力を鍛えよう</div>
</div>

<div class="stats">
<div class="stat"><div class="num" id="statRead">0</div><div class="label">読了</div></div>
<div class="stat"><div class="num" id="statAcc">0%</div><div class="label">正解率</div></div>
<div class="stat"><div class="num" id="statSpeed">-</div><div class="label">平均秒</div></div>
<div class="stat"><div class="num" id="statWrong">0</div><div class="label">错题</div></div>
</div>

<div class="tabs">
<button class="tab active" onclick="switchMode('timed')">⏱️ 限时短文</button>
<button class="tab" onclick="switchMode('summary')">📋 段落大意</button>
<button class="tab" onclick="switchMode('keyline')">🎯 关键句</button>
<button class="tab" onclick="switchMode('search')">🔍 情報検索</button>
<button class="tab" onclick="switchMode('trap')">⚠️ 陷阱识别</button>
<button class="tab" onclick="switchMode('wrong')">📝 错题本</button>
</div>

<div id="content"></div>
</div>

<script>
const STORAGE_KEY = 'n2_reading_train';
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || {
  totalRead: 0, totalCorrect: 0, totalAnswered: 0, times: [], wrongLog: []
};
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// === Reading Data: 20+ passages ===
const passages = [
  { id:1, topic:'社会', title:'少子化問題', type:'timed',
    text:'<ruby>日本<rt>にほん</rt></ruby>では<ruby>少子化<rt>しょうしか</rt></ruby>が<ruby>深刻<rt>しんこく</rt></ruby>な<ruby>問題<rt>もんだい</rt></ruby>となっている。<ruby>出生率<rt>しゅっしょうりつ</rt></ruby>は<ruby>年々<rt>ねんねん</rt></ruby><ruby>低下<rt>ていか</rt></ruby>しており、<ruby>将来<rt>しょうらい</rt></ruby>の<ruby>労働力不足<rt>ろうどうりょくぶそく</rt></ruby>が<ruby>心配<rt>しんぱい</rt></ruby>されている。<ruby>政府<rt>せいふ</rt></ruby>は<ruby>子育<rt>こそだ</rt></ruby>て<ruby>支援<rt>しえん</rt></ruby>や<ruby>育児休暇<rt>いくじきゅうか</rt></ruby>の<ruby>充実<rt>じゅうじつ</rt></ruby>など、さまざまな<ruby>対策<rt>たいさく</rt></ruby>を<ruby>打<rt>う</rt></ruby>ち<ruby>出<rt>だ</rt></ruby>しているが、<ruby>効果<rt>こうか</rt></ruby>はまだ<ruby>十分<rt>じゅうぶん</rt></ruby>とは<ruby>言<rt>い</rt></ruby>えない。<ruby>若<rt>わか</rt></ruby>い<ruby>世代<rt>せだい</rt></ruby>が<ruby>安心<rt>あんしん</rt></ruby>して<ruby>子供<rt>こども</rt></ruby>を<ruby>育<rt>そだ</rt></ruby>てられる<ruby>環境<rt>かんきょう</rt></ruby>づくりが<ruby>急務<rt>きゅうむ</rt></ruby>である。',
    questions:[
      { q:'この文章の主な問題点は何ですか？', options:['経済の低迷','少子化による労働力不足','教育制度の問題','高齢者の増加'], answer:1 },
      { q:'政府の対策について正しいものはどれですか？', options:['十分な効果が出ている','まだ効果が不十分','対策をしていない','若者が反対している'], answer:1 }
    ]},
  { id:2, topic:'科技', title:'AI技術の進歩', type:'timed',
    text:'<ruby>人工知能<rt>じんこうちのう</rt></ruby>（AI）の<ruby>技術<rt>ぎじゅつ</rt></ruby>は<ruby>近年<rt>きんねん</rt></ruby><ruby>急速<rt>きゅうそく</rt></ruby>に<ruby>発展<rt>はってん</rt></ruby>している。<ruby>医療<rt>いりょう</rt></ruby>、<ruby>教育<rt>きょういく</rt></ruby>、<ruby>交通<rt>こうつう</rt></ruby>など、あらゆる<ruby>分野<rt>ぶんや</rt></ruby>でAIが<ruby>活用<rt>かつよう</rt></ruby>されるようになった。しかし、AIの<ruby>普及<rt>ふきゅう</rt></ruby>によって<ruby>仕事<rt>しごと</rt></ruby>を<ruby>失<rt>うしな</rt></ruby>う<ruby>人<rt>ひと</rt></ruby>が<ruby>増<rt>ふ</rt></ruby>えるのではないかという<ruby>不安<rt>ふあん</rt></ruby>もある。<ruby>大切<rt>たいせつ</rt></ruby>なのは、AIと<ruby>共存<rt>きょうぞん</rt></ruby>しながら、<ruby>人間<rt>にんげん</rt></ruby>にしかできない<ruby>創造的<rt>そうぞうてき</rt></ruby>な<ruby>仕事<rt>しごと</rt></ruby>を<ruby>見<rt>み</rt></ruby>つけていくことだろう。',
    questions:[
      { q:'筆者が最も伝えたいことは？', options:['AIは危険だ','AIと共存する方法を考えるべきだ','AIを制限すべきだ','AIは医療にだけ使うべきだ'], answer:1 },
      { q:'AIの普及による懸念は何ですか？', options:['電力不足','失業者の増加','教育の質の低下','人口減少'], answer:1 }
    ]},
  { id:3, topic:'文化', title:'日本の祭り', type:'summary',
    text:'<ruby>日本<rt>にほん</rt></ruby>の<ruby>祭<rt>まつ</rt></ruby>りは、<ruby>地域<rt>ちいき</rt></ruby>の<ruby>人々<rt>ひとびと</rt></ruby>のつながりを<ruby>深<rt>ふか</rt></ruby>める<ruby>重要<rt>じゅうよう</rt></ruby>な<ruby>役割<rt>やくわり</rt></ruby>を<ruby>果<rt>は</rt></ruby>たしてきた。しかし、<ruby>少子高齢化<rt>しょうしこうれいか</rt></ruby>や<ruby>都市化<rt>としか</rt></ruby>の<ruby>影響<rt>えいきょう</rt></ruby>で、<ruby>参加者<rt>さんかしゃ</rt></ruby>が<ruby>減少<rt>げんしょう</rt></ruby>している<ruby>祭<rt>まつ</rt></ruby>りも<ruby>多<rt>おお</rt></ruby>い。<ruby>最近<rt>さいきん</rt></ruby>では、SNSを<ruby>活用<rt>かつよう</rt></ruby>して<ruby>若者<rt>わかもの</rt></ruby>や<ruby>外国人<rt>がいこくじん</rt></ruby><ruby>観光客<rt>かんこうきゃく</rt></ruby>を<ruby>呼<rt>よ</rt></ruby>び<ruby>込<rt>こ</rt></ruby>む<ruby>取<rt>と</rt></ruby>り<ruby>組<rt>く</rt></ruby>みも<ruby>見<rt>み</rt></ruby>られる。<ruby>伝統<rt>でんとう</rt></ruby>を<ruby>守<rt>まも</rt></ruby>りながらも、<ruby>時代<rt>じだい</rt></ruby>に<ruby>合<rt>あ</rt></ruby>わせた<ruby>工夫<rt>くふう</rt></ruby>が<ruby>求<rt>もと</rt></ruby>められている。',
    questions:[
      { q:'この文章の最も適切な要約は？', options:['日本の祭りは廃止すべきだ','祭りは伝統を守りつつ時代に合わせる工夫が必要','SNSが祭りを破壊している','外国人が祭りを変えている'], answer:1 },
      { q:'祭りの参加者が減少している原因は？', options:['天候不良','経済不況','少子高齢化と都市化','外国人の増加'], answer:2 }
    ]},
  { id:4, topic:'教育', title:'オンライン教育', type:'timed',
    text:'コロナ<ruby>禍<rt>か</rt></ruby>をきっかけに、オンライン<ruby>教育<rt>きょういく</rt></ruby>が<ruby>急速<rt>きゅうそく</rt></ruby>に<ruby>広<rt>ひろ</rt></ruby>まった。<ruby>場所<rt>ばしょ</rt></ruby>を<ruby>選<rt>えら</rt></ruby>ばず<ruby>学<rt>まな</rt></ruby>べる<ruby>利便性<rt>りべんせい</rt></ruby>がある<ruby>一方<rt>いっぽう</rt></ruby>で、<ruby>集中力<rt>しゅうちゅうりょく</rt></ruby>の<ruby>維持<rt>いじ</rt></ruby>や<ruby>生徒<rt>せいと</rt></ruby><ruby>同士<rt>どうし</rt></ruby>の<ruby>交流<rt>こうりゅう</rt></ruby>の<ruby>減少<rt>げんしょう</rt></ruby>が<ruby>課題<rt>かだい</rt></ruby>として<ruby>挙<rt>あ</rt></ruby>げられている。<ruby>今後<rt>こんご</rt></ruby>は、<ruby>対面<rt>たいめん</rt></ruby><ruby>授業<rt>じゅぎょう</rt></ruby>とオンラインの<ruby>長所<rt>ちょうしょ</rt></ruby>を<ruby>組<rt>く</rt></ruby>み<ruby>合<rt>あ</rt></ruby>わせたハイブリッド<ruby>型<rt>がた</rt></ruby>の<ruby>教育<rt>きょういく</rt></ruby>が<ruby>主流<rt>しゅりゅう</rt></ruby>になるだろう。',
    questions:[
      { q:'オンライン教育の課題は何ですか？', options:['費用が高い','集中力維持と交流減少','インターネットが遅い','先生が足りない'], answer:1 },
      { q:'筆者は今後どうなると考えていますか？', options:['完全にオンラインになる','対面に戻る','ハイブリッド型が主流になる','教育がなくなる'], answer:2 }
    ]},
  { id:5, topic:'環境', title:'プラスチック問題', type:'timed',
    text:'<ruby>海洋<rt>かいよう</rt></ruby>プラスチック<ruby>汚染<rt>おせん</rt></ruby>は、<ruby>世界的<rt>せかいてき</rt></ruby>な<ruby>環境問題<rt>かんきょうもんだい</rt></ruby>の<ruby>一<rt>ひと</rt></ruby>つである。<ruby>毎年<rt>まいとし</rt></ruby><ruby>大量<rt>たいりょう</rt></ruby>のプラスチックごみが<ruby>海<rt>うみ</rt></ruby>に<ruby>流<rt>なが</rt></ruby>れ<ruby>込<rt>こ</rt></ruby>み、<ruby>海洋生物<rt>かいようせいぶつ</rt></ruby>に<ruby>深刻<rt>しんこく</rt></ruby>な<ruby>影響<rt>えいきょう</rt></ruby>を<ruby>与<rt>あた</rt></ruby>えている。<ruby>各国<rt>かっこく</rt></ruby>ではレジ<ruby>袋<rt>ぶくろ</rt></ruby>の<ruby>有料化<rt>ゆうりょうか</rt></ruby>や<ruby>使<rt>つか</rt></ruby>い<ruby>捨<rt>す</rt></ruby>てプラスチックの<ruby>削減<rt>さくげん</rt></ruby>に<ruby>取<rt>と</rt></ruby>り<ruby>組<rt>く</rt></ruby>んでいる。<ruby>一人<rt>ひとり</rt></ruby>ひとりの<ruby>意識<rt>いしき</rt></ruby><ruby>改革<rt>かいかく</rt></ruby>が<ruby>必要<rt>ひつよう</rt></ruby>である。',
    questions:[
      { q:'この問題の解決に最も重要なのは？', options:['政府だけの努力','企業の利益','個人の意識改革','技術の発展'], answer:2 },
      { q:'各国が行っている対策は？', options:['海を閉鎖する','レジ袋有料化と使い捨て削減','プラスチック生産禁止','魚を保護する'], answer:1 }
    ]},
  { id:6, topic:'社会', title:'テレワーク', type:'summary',
    text:'テレワークの<ruby>普及<rt>ふきゅう</rt></ruby>により、<ruby>働<rt>はたら</rt></ruby>き<ruby>方<rt>かた</rt></ruby>が<ruby>大<rt>おお</rt></ruby>きく<ruby>変<rt>か</rt></ruby>わった。<ruby>通勤時間<rt>つうきんじかん</rt></ruby>がなくなり、<ruby>自由<rt>じゆう</rt></ruby>な<ruby>時間<rt>じかん</rt></ruby>が<ruby>増<rt>ふ</rt></ruby>えた<ruby>一方<rt>いっぽう</rt></ruby>で、<ruby>仕事<rt>しごと</rt></ruby>と<ruby>生活<rt>せいかつ</rt></ruby>の<ruby>境界<rt>きょうかい</rt></ruby>が<ruby>曖昧<rt>あいまい</rt></ruby>になり、<ruby>長時間労働<rt>ちょうじかんろうどう</rt></ruby>や<ruby>孤独感<rt>こどくかん</rt></ruby>を<ruby>感<rt>かん</rt></ruby>じる<ruby>人<rt>ひと</rt></ruby>も<ruby>少<rt>すく</rt></ruby>なくない。<ruby>企業<rt>きぎょう</rt></ruby>には、<ruby>社員<rt>しゃいん</rt></ruby>の<ruby>心身<rt>しんしん</rt></ruby>の<ruby>健康<rt>けんこう</rt></ruby>を<ruby>守<rt>まも</rt></ruby>る<ruby>新<rt>あたら</rt></ruby>しい<ruby>仕組<rt>しく</rt></ruby>みが<ruby>求<rt>もと</rt></ruby>められている。',
    questions:[
      { q:'テレワークの課題として挙げられていないものは？', options:['長時間労働','孤独感','仕事と生活の境界の曖昧さ','通勤費用の増加'], answer:3 },
      { q:'この文章の要約として最も適切なものは？', options:['テレワークは廃止すべきだ','テレワークにはメリットとデメリットがあり企業の対応が必要','テレワークは完璧な制度だ','全員が出社すべきだ'], answer:1 }
    ]},
  { id:7, topic:'科技', title:'自動運転', type:'keyline',
    text:'<ruby>自動運転<rt>じどううんてん</rt></ruby><ruby>技術<rt>ぎじゅつ</rt></ruby>の<ruby>開発<rt>かいはつ</rt></ruby>が<ruby>進<rt>すす</rt></ruby>んでいる。<ruby>事故<rt>じこ</rt></ruby>の<ruby>減少<rt>げんしょう</rt></ruby>や<ruby>高齢者<rt>こうれいしゃ</rt></ruby>の<ruby>移動手段<rt>いどうしゅだん</rt></ruby>として<ruby>期待<rt>きたい</rt></ruby>される<ruby>一方<rt>いっぽう</rt></ruby>、<ruby>技術<rt>ぎじゅつ</rt></ruby>の<ruby>信頼性<rt>しんらいせい</rt></ruby>や<ruby>事故<rt>じこ</rt></ruby>の<ruby>責任問題<rt>せきにんもんだい</rt></ruby>など、<ruby>解決<rt>かいけつ</rt></ruby>すべき<ruby>課題<rt>かだい</rt></ruby>も<ruby>多<rt>おお</rt></ruby>い。<ruby>技術<rt>ぎじゅつ</rt></ruby>の<ruby>進歩<rt>しんぽ</rt></ruby>と<ruby>社会<rt>しゃかい</rt></ruby>の<ruby>受<rt>う</rt></ruby>け<ruby>入<rt>い</rt></ruby>れ<ruby>体制<rt>たいせい</rt></ruby>の<ruby>両方<rt>りょうほう</rt></ruby>が<ruby>整<rt>ととの</rt></ruby>って<ruby>初<rt>はじ</rt></ruby>めて、<ruby>本当<rt>ほんとう</rt></ruby>の<ruby>実用化<rt>じつようか</rt></ruby>が<ruby>可能<rt>かのう</rt></ruby>になるだろう。',
    questions:[
      { q:'筆者が最も伝えたい一文は？', options:['自動運転技術の開発が進んでいる','事故の減少が期待される','技術の進歩と社会の受け入れ体制の両方が整って初めて実用化が可能になる','解決すべき課題も多い'], answer:2 }

    text:'<ruby>読書<rt>どくしょ</rt></ruby>は<ruby>知識<rt>ちしき</rt></ruby>を<ruby>増<rt>ふ</rt></ruby>やすだけでなく、<ruby>想像力<rt>そうぞうりょく</rt></ruby>や<ruby>共感力<rt>きょうかんりょく</rt></ruby>を<ruby>育<rt>そだ</rt></ruby>てる。<ruby>特<rt>とく</rt></ruby>に<ruby>子供<rt>こども</rt></ruby>の<ruby>時期<rt>じき</rt></ruby>に<ruby>読書<rt>どくしょ</rt></ruby>の<ruby>習慣<rt>しゅうかん</rt></ruby>をつけることが<ruby>重要<rt>じゅうよう</rt></ruby>だ。ただし、<ruby>何<rt>なに</rt></ruby>を<ruby>読<rt>よ</rt></ruby>むかよりも、<ruby>読<rt>よ</rt></ruby>むこと<ruby>自体<rt>じたい</rt></ruby>を<ruby>楽<rt>たの</rt></ruby>しむことが<ruby>大切<rt>たいせつ</rt></ruby>だ。',
    questions:[
      { q:'筆者の考えに合うものは？\n【陷阱提示：注意"条件すり替え"】', options:['難しい本を読むべきだ（条件すり替え：内容を限定）','読書を楽しむことが大切（正解）','子供だけが読書すべき（範囲を限定）','知識を増やすことが一番大切（優先順位のすり替え）'], answer:1, trapExplain:'选项1把"何を読むかより楽しむこと"偷换为"难的书"。选项3把"特に子供"偷换为"只有孩子"。选项4把文中多个效果中的一个当作最重要的。' }
    ]},
];

let currentMode = 'timed';
let currentQ = 0;
let timerInterval = null;
let startTime = 0;
let elapsedSec = 0;

function switchMode(mode) {
  currentMode = mode;
  currentQ = 0;
  stopTimer();
  document.querySelectorAll('.tab').forEach((t,i) => {
    const modes = ['timed','summary','keyline','search','trap','wrong'];
    t.classList.toggle('active', modes[i] === mode);
  });
  render();
}

function getFilteredPassages() {
  const typeMap = { timed:'timed', summary:'summary', keyline:'keyline', search:'search', trap:'trap' };
  return passages.filter(p => p.type === typeMap[currentMode]);
}

function updateStats() {
  document.getElementById('statRead').textContent = state.totalRead;
  document.getElementById('statAcc').textContent = state.totalAnswered ? Math.round(state.totalCorrect/state.totalAnswered*100)+'%' : '0%';
  const avgTime = state.times.length ? Math.round(state.times.reduce((a,b)=>a+b,0)/state.times.length) : '-';
  document.getElementById('statSpeed').textContent = avgTime;
  document.getElementById('statWrong').textContent = state.wrongLog.length;
}

function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    elapsedSec = Math.round((Date.now()-startTime)/1000);
    const el = document.getElementById('timer');
    if (el) el.textContent = formatTime(elapsedSec);
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); timerInterval = null; }
function formatTime(s) { return Math.floor(s/60).toString().padStart(2,'0')+':'+((s%60).toString().padStart(2,'0')); }

function render() {
  updateStats();
  const el = document.getElementById('content');
  if (currentMode === 'wrong') { renderWrong(el); return; }
  const list = getFilteredPassages();
  if (currentQ >= list.length) {
    el.innerHTML = '<div class="card"><div class="result-banner good"><h2>🎉 全部完了！</h2></div><div class="btn-group"><button class="btn btn-primary" onclick="currentQ=0;render()">最初から</button></div></div>';
    return;
  }
  const p = list[currentQ];
  stopTimer();
  startTimer();
  el.innerHTML = `
    <div class="card">
      <div class="counter">${currentQ+1} / ${list.length} <span class="topic-tag">${p.topic}</span></div>
      <div class="timer running" id="timer">00:00</div>
      <div class="passage">${p.text}</div>
      <div id="questions"></div>
    </div>`;
  renderQuestions(p);
}

let answeredQs = {};
function renderQuestions(p) {
  answeredQs = {};
  const qEl = document.getElementById('questions');
  qEl.innerHTML = p.questions.map((q,qi) => `
    <div style="margin-top:16px;">
      <p style="font-size:14px;font-weight:bold;line-height:1.6;">${q.q}</p>
      <div class="quiz-options" id="qOpts${qi}">
        ${q.options.map((o,oi) => `<div class="quiz-option" onclick="answerReading(${qi},${oi})">${o}</div>`).join('')}
      </div>
    </div>
  `).join('') + '<div id="readingResult" class="hidden"></div>';
}

function answerReading(qi, oi) {
  const list = getFilteredPassages();
  const p = list[currentQ];
  const q = p.questions[qi];
  if (answeredQs[qi] !== undefined) return;
  answeredQs[qi] = oi;
  const opts = document.querySelectorAll(`#qOpts${qi} .quiz-option`);
  opts.forEach(o => o.classList.add('disabled'));
  opts[q.answer].classList.add('correct');
  const correct = oi === q.answer;
  if (!correct) opts[oi].classList.add('wrong');
  state.totalAnswered++;
  if (correct) state.totalCorrect++;
  else state.wrongLog.push({ passage: p.title, question: q.q, yourAnswer: q.options[oi], correctAnswer: q.options[q.answer] });
  // Check all answered
  if (Object.keys(answeredQs).length === p.questions.length) {
    stopTimer();
    state.totalRead++;
    state.times.push(elapsedSec);
    saveState();
    updateStats();
    const resEl = document.getElementById('readingResult');
    resEl.classList.remove('hidden');
    const allCorrect = p.questions.every((q,i) => answeredQs[i] === q.answer);
    let trapHtml = '';
    if (currentMode === 'trap' && p.questions[0].trapExplain) {
      trapHtml = `<div class="explain" style="margin-top:12px;">🎯 陷阱解析：${p.questions[0].trapExplain}</div>`;
    }
    resEl.innerHTML = `
      <div class="result-banner ${allCorrect?'good':'bad'}">
        ⏱️ 用时: ${formatTime(elapsedSec)} | ${allCorrect?'✅ 全对':'❌ 有错误'}
      </div>
      ${trapHtml}
      <div class="btn-group"><button class="btn btn-primary" onclick="currentQ++;render()">次の文章 →</button></div>`;
  } else {
    saveState();
  }
}

function renderWrong(el) {
  if (state.wrongLog.length === 0) {
    el.innerHTML = '<div class="card"><p style="text-align:center;color:#2ec4b6;">✨ 错题本为空！继续加油！</p></div>';
    return;
  }
  el.innerHTML = `<div class="card"><h3>📝 错题本 (${state.wrongLog.length})</h3>
    ${state.wrongLog.slice(-20).reverse().map(w => `
      <div style="padding:12px 0;border-bottom:1px solid #f0f0f0;">
        <p style="font-size:13px;color:#666;">${w.passage}</p>
        <p style="font-size:14px;margin:4px 0;">${w.question}</p>
        <p style="font-size:13px;color:#e63946;">你的答案: ${w.yourAnswer}</p>
        <p style="font-size:13px;color:#2ec4b6;">正确答案: ${w.correctAnswer}</p>
      </div>
    `).join('')}
    <div class="btn-group"><button class="btn btn-danger btn-sm" onclick="if(confirm('清空错题本？')){state.wrongLog=[];saveState();render();}">清空</button></div>
  </div>`;
}

render();

// ============ 跨设备同步 ============
function exportData() {
  const keys = Object.keys(localStorage);
  const data = {};
  keys.forEach(k => { try { data[k] = JSON.parse(localStorage.getItem(k)); } catch(e) { data[k] = localStorage.getItem(k); } });
  const json = JSON.stringify(data);
  const ta = document.getElementById('syncData');
  ta.value = json;
  ta.select();
  try { navigator.clipboard.writeText(json); showSyncMsg('✅ 已复制到剪贴板！粘贴到另一台设备导入即可'); } 
  catch(e) { showSyncMsg('⬆️ 请手动全选复制上面的文本'); }
}
function importData() {
  const raw = document.getElementById('syncData').value.trim();
  if (!raw) { showSyncMsg('❌ 请先粘贴数据'); return; }
  try {
    const data = JSON.parse(raw);
    let count = 0;
    for (const [k, v] of Object.entries(data)) {
      localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v));
      count++;
    }
    showSyncMsg('✅ 导入成功！共 ' + count + ' 条数据，刷新页面生效');
    setTimeout(() => location.reload(), 1500);
  } catch(e) { showSyncMsg('❌ 数据格式错误，请检查'); }
}
function showSyncMsg(msg) {
  const el = document.getElementById('syncMsg');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}
