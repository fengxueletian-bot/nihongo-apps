<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f7fa;min-height:100vh;padding:20px}
h1{text-align:center;color:#333;margin:20px 0 8px;font-size:22px}
.subtitle{text-align:center;color:#666;font-size:13px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:400px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:20px 16px;text-align:center;text-decoration:none;color:#333;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:transform .2s}
.card:active{transform:scale(.96)}
.card .emoji{font-size:32px;margin-bottom:8px}
.card .name{font-size:14px;font-weight:600}
.card .desc{font-size:11px;color:#888;margin-top:4px}
.section{margin-top:20px;max-width:400px;margin-left:auto;margin-right:auto}
.section h2{font-size:14px;color:#4361ee;margin-bottom:8px;padding-left:4px}
</style>
</head>
<body>
<div id="syncBanner" style="background:#fff3cd;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:none;max-width:400px;margin-left:auto;margin-right:auto">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:12px;color:#856404">📱 检测到其他设备有更新数据</span>
    <button onclick="showSyncPanel()" style="padding:4px 10px;border:none;border-radius:6px;background:#4361ee;color:#fff;font-size:11px;cursor:pointer">同步</button>
  </div>
</div>
<div id="syncPanel" style="display:none;background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;max-width:400px;margin-left:auto;margin-right:auto;box-shadow:0 2px 8px rgba(0,0,0,.06)">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span style="font-size:14px;font-weight:600">📱 数据同步</span>
    <button onclick="hideSyncPanel()" style="border:none;background:none;font-size:18px;cursor:pointer;color:#888">✕</button>
  </div>
  <button onclick="exportAll()" style="display:block;width:100%;padding:10px;border:none;border-radius:8px;background:#4361ee;color:#fff;font-size:13px;cursor:pointer;margin-bottom:6px">📤 导出数据到剪贴板</button>
  <textarea id="syncAllData" style="width:100%;height:80px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:11px;margin-bottom:6px" placeholder="粘贴其他设备导出的数据..."></textarea>
  <button onclick="importAll()" style="display:block;width:100%;padding:10px;border:none;border-radius:8px;background:#2ec4b6;color:#fff;font-size:13px;cursor:pointer">📥 导入数据</button>
  <div id="syncAllMsg" style="text-align:center;padding:6px;font-size:12px;color:#2ec4b6;display:none"></div>
</div>
<h1>📚 日本語学習</h1>
<p class="subtitle">Aya's N2/N3 学習ツール</p>

<div class="section"><h2>📋 今日学习清单</h2></div>
<div style="background:#fff;margin:0 auto 16px;max-width:400px;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)">
  <div style="font-size:12px;color:#888;margin-bottom:10px">周一～周五 | 每日约2小时 | 周五为总复习日</div>
  <label style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:10px;cursor:pointer">
    <input type="checkbox" class="task-cb" data-task="verb" style="width:18px;height:18px;accent-color:#4361ee">
    <div><div style="font-size:14px;font-weight:600">⚡ 动词活用热身</div><div style="font-size:11px;color:#888">5-10分 → 混合挑战模式</div></div>
  </label>
  <label style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:10px;cursor:pointer">
    <input type="checkbox" class="task-cb" data-task="vocab" style="width:18px;height:18px;accent-color:#4361ee">
    <div><div style="font-size:14px;font-weight:600">📖 N2单词学习</div><div style="font-size:11px;color:#888">25分 → 新词30个 + 填空回忆</div></div>
  </label>
  <label style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:10px;cursor:pointer">
    <input type="checkbox" class="task-cb" data-task="n2grammar" style="width:18px;height:18px;accent-color:#4361ee">
    <div><div style="font-size:14px;font-weight:600">📗 N2文法学习</div><div style="font-size:11px;color:#888">40分 → 视频 + 真题练习 + 造句</div></div>
  </label>
  <label style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:10px;cursor:pointer">
    <input type="checkbox" class="task-cb" data-task="n3grammar" style="width:18px;height:18px;accent-color:#4361ee">
    <div><div style="font-size:14px;font-weight:600">📝 N3文法复习</div><div style="font-size:11px;color:#888">15分 → 做题巩固</div></div>
  </label>
  <label style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:10px;cursor:pointer">
    <input type="checkbox" class="task-cb" data-task="output" style="width:18px;height:18px;accent-color:#4361ee">
    <div><div style="font-size:14px;font-weight:600">✍️ 造句输出</div><div style="font-size:11px;color:#888">10分 → 用今天的语法造2句话发给老师</div></div>
  </label>
  <label style="display:flex;align-items:center;padding:10px 0;gap:10px;cursor:pointer">
    <input type="checkbox" class="task-cb" data-task="review" style="width:18px;height:18px;accent-color:#4361ee">
    <div><div style="font-size:14px;font-weight:600">🔄 毎日復習</div><div style="font-size:11px;color:#888">晚上/碎片时间 → 当天内容真题</div></div>
  </label>
  <div style="margin-top:12px;text-align:center">
    <span id="taskProgress" style="font-size:13px;color:#4361ee;font-weight:600">0/6 完成</span>
    <div style="height:4px;background:#eee;border-radius:2px;margin-top:6px"><div id="taskBar" style="height:100%;background:#4361ee;border-radius:2px;width:0%;transition:width .3s"></div></div>
  </div>
  <div style="margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:#888">⏱️ 今日学习时长</span>
      <span id="autoTimer" style="font-size:15px;font-weight:700;color:#4361ee;font-family:monospace">0分</span>
    </div>
    <div id="weekHistory" style="display:flex;gap:3px;margin-top:8px;align-items:end;height:40px"></div>
  </div>
  
</div>
<script>
(function(){
  const today = new Date().toISOString().slice(0,10);
  const key = 'daily_tasks_' + today;
  let tasks = JSON.parse(localStorage.getItem(key) || '{}');
  const cbs = document.querySelectorAll('.task-cb');
  cbs.forEach(cb => {
    const t = cb.dataset.task;
    cb.checked = !!tasks[t];
    cb.addEventListener('change', () => {
      tasks[t] = cb.checked;
      localStorage.setItem(key, JSON.stringify(tasks));
      updateProgress();
    });
  });
  function updateProgress() {
    const done = Object.values(tasks).filter(v=>v).length;
    document.getElementById('taskProgress').textContent = done + '/6 完成';
    document.getElementById('taskBar').style.width = (done/6*100)+'%';
    if (done === 6) document.getElementById('taskProgress').textContent = '🎉 今日全部完成！';
  }
  updateProgress();
})();

// ============ 自动计时（基于页面可见时间）============
(function(){
  const today = new Date().toISOString().slice(0,10);
  const tKey = 'auto_time_' + today;
  let seconds = parseInt(localStorage.getItem(tKey) || '0');
  let lastVisible = document.hidden ? null : Date.now();
  
  // Track visibility
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      if (lastVisible) { seconds += Math.round((Date.now()-lastVisible)/1000); localStorage.setItem(tKey,String(seconds)); updateAutoTimer(); }
      lastVisible = null;
    } else { lastVisible = Date.now(); }
  });
  // Periodic save
  setInterval(() => {
    if (lastVisible) { seconds += Math.round((Date.now()-lastVisible)/1000); lastVisible = Date.now(); localStorage.setItem(tKey,String(seconds)); updateAutoTimer(); }
  }, 60000);
  
  function updateAutoTimer() {
    const m = Math.round(seconds/60);
    const el = document.getElementById('autoTimer');
    if (el) el.textContent = m >= 60 ? Math.floor(m/60)+'时'+m%60+'分' : m+'分';
  }
  updateAutoTimer();
  
  // Week history bars
  function renderWeekBars() {
    const el = document.getElementById('weekHistory');
    if (!el) return;
    const bars = [];
    for (let i=6;i>=0;i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const dk = 'auto_time_' + d.toISOString().slice(0,10);
      const s = parseInt(localStorage.getItem(dk)||'0');
      const m = Math.round(s/60);
      const h = Math.max(4, Math.min(36, m/120*36));
      const isToday = i===0;
      const dayNames = ['日','月','火','水','木','金','土'];
      bars.push('<div style="display:flex;flex-direction:column;align-items:center;flex:1"><div style="width:100%;height:'+h+'px;background:'+(isToday?'#4361ee':'#c5cae9')+';border-radius:3px"></div><div style="font-size:9px;color:#888;margin-top:2px">'+dayNames[d.getDay()]+'</div><div style="font-size:9px;color:#4361ee">'+(m>0?m+'m':'')+'</div></div>');
    }
    el.innerHTML = bars.join('');
  }
  renderWeekBars();
})();

// ============ 数据同步 ============
function showSyncPanel(){document.getElementById('syncPanel').style.display='block';document.getElementById('syncBanner').style.display='none';}
function hideSyncPanel(){document.getElementById('syncPanel').style.display='none';}
function exportAll(){
  const data={};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);try{data[k]=JSON.parse(localStorage.getItem(k));}catch(e){data[k]=localStorage.getItem(k);}}
  const json=JSON.stringify(data);
  document.getElementById('syncAllData').value=json;
  try{navigator.clipboard.writeText(json);showAllMsg('✅ 已复制！粘贴到另一台设备导入');}
  catch(e){document.getElementById('syncAllData').select();showAllMsg('⬆️ 请手动全选复制');}
}
function importAll(){
  const raw=document.getElementById('syncAllData').value.trim();
  if(!raw){showAllMsg('❌ 请先粘贴数据');return;}
  try{const data=JSON.parse(raw);let c=0;for(const[k,v]of Object.entries(data)){localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v));c++;}
  showAllMsg('✅ 导入'+c+'条数据，刷新中...');setTimeout(()=>location.reload(),1500);}catch(e){showAllMsg('❌ 格式错误');}
}
function showAllMsg(msg){const el=document.getElementById('syncAllMsg');el.textContent=msg;el.style.display='block';setTimeout(()=>{el.style.display='none';},4000);}
// Show sync button in header for easy access
(function(){
  // Check if this might be a new device (no data)
  const hasData = localStorage.length > 3;
  if (!hasData) document.getElementById('syncBanner').style.display='block';
})();


</script>
