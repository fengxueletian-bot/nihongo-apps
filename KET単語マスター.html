<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta name="google" content="notranslate">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KET Word Master 🌟</title>
<style>
:root {
  --primary: #6C5CE7;
  --primary-light: #A29BFE;
  --success: #00B894;
  --danger: #FF6B6B;
  --warning: #FDCB6E;
  --info: #74B9FF;
  --bg: #F8F7FF;
  --card: #FFFFFF;
  --text: #2D3436;
  --text2: #636E72;
  --border: #E9E5FF;
  --shadow: rgba(108,92,231,0.1);
  --radius: 16px;
}
@media(prefers-color-scheme:dark){
  :root {
    --bg: #1A1A2E;
    --card: #16213E;
    --text: #E8E8E8;
    --text2: #A0A0B0;
    --border: #2A2A4A;
    --shadow: rgba(0,0,0,0.3);
  }
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);-webkit-tap-highlight-color:transparent;}
.app{max-width:480px;margin:0 auto;padding:12px 16px 100px;}
.header{text-align:center;padding:16px 0 8px;}
.header h1{font-size:26px;background:linear-gradient(135deg,#6C5CE7,#FF6B6B,#FDCB6E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header .sub{font-size:13px;color:var(--text2);margin-top:4px;}
.stats{display:flex;justify-content:space-around;background:var(--card);border-radius:var(--radius);padding:14px 8px;margin:12px 0;box-shadow:0 2px 12px var(--shadow);}
.stat{text-align:center;}
.stat .num{font-size:22px;font-weight:bold;background:linear-gradient(135deg,var(--primary),var(--info));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat .label{font-size:11px;color:var(--text2);margin-top:2px;}
.streak-badge{display:inline-block;background:linear-gradient(135deg,#FF6B6B,#FDCB6E);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold;margin:8px 0;}
.tabs{display:flex;gap:6px;margin:12px 0;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:8px 14px;border-radius:20px;border:none;background:var(--card);color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;box-shadow:0 1px 4px var(--shadow);transition:all .2s;}
.tab.active{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;box-shadow:0 2px 8px rgba(108,92,231,0.3);}
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin:12px 0;box-shadow:0 2px 12px var(--shadow);}
.progress-bar{height:8px;background:var(--border);border-radius:4px;margin:10px 0;overflow:hidden;}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--info),var(--success));border-radius:4px;transition:width .4s ease;}
.word-big{font-size:32px;font-weight:bold;text-align:center;color:var(--text);margin:12px 0;}
.phonetic{font-size:14px;color:var(--primary);text-align:center;}
.meaning-text{font-size:18px;color:var(--text2);text-align:center;margin:8px 0;}
.pos-tag{display:inline-block;background:var(--border);color:var(--primary);padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;}
.example-box{font-size:14px;color:var(--text);margin-top:12px;padding:12px;background:var(--bg);border-radius:10px;line-height:1.8;border-left:3px solid var(--primary);}
.example-box .highlight{color:var(--primary);font-weight:bold;}
.btn{padding:12px 24px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;touch-action:manipulation;}
.btn:active{transform:scale(0.96);}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;box-shadow:0 2px 8px rgba(108,92,231,0.3);}
.btn-success{background:linear-gradient(135deg,var(--success),#55EFC4);color:#fff;}
.btn-danger{background:linear-gradient(135deg,var(--danger),#FF8E8E);color:#fff;}
.btn-outline{background:var(--card);border:2px solid var(--border);color:var(--text);}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:10px;}
.btn-group{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
.speaker-btn{background:none;border:none;font-size:28px;cursor:pointer;padding:4px;transition:transform .2s;}
.speaker-btn:active{transform:scale(1.2);}
.quiz-options{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.quiz-opt{padding:14px 16px;border:2px solid var(--border);border-radius:12px;cursor:pointer;font-size:15px;transition:all .2s;background:var(--card);text-align:left;}
.quiz-opt:active{transform:scale(0.98);}
.quiz-opt.correct{border-color:var(--success);background:rgba(0,184,148,0.1);}
.quiz-opt.wrong{border-color:var(--danger);background:rgba(255,107,107,0.1);}
.quiz-opt.disabled{pointer-events:none;opacity:0.7;}
.input-area{margin-top:14px;}
.input-area input{width:100%;padding:14px;border:2px solid var(--border);border-radius:12px;font-size:18px;outline:none;background:var(--card);color:var(--text);text-align:center;letter-spacing:2px;}
.input-area input:focus{border-color:var(--primary);}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
.counter{font-size:13px;color:var(--text2);}
.hidden{display:none!important;}
/* Reward animation */
.reward-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;}
.confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:fall 2s ease-in forwards;}
@keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(100vh) rotate(720deg);}}
.star-burst{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;animation:starburst .8s ease-out forwards;pointer-events:none;z-index:9999;}
@keyframes starburst{0%{opacity:1;transform:translate(-50%,-50%) scale(0);}50%{transform:translate(-50%,-50%) scale(1.3);}100%{opacity:0;transform:translate(-50%,-50%) scale(1.5);}}
/* Sentence fill blank */
.sentence-fill{font-size:16px;line-height:2;text-align:center;margin:16px 0;}
.blank-slot{display:inline-block;min-width:80px;border-bottom:3px solid var(--primary);padding:2px 8px;margin:0 4px;font-weight:bold;color:var(--primary);}
/* Topic selector */
.topic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0;}
.topic-btn{padding:12px;border-radius:12px;border:2px solid var(--border);background:var(--card);cursor:pointer;text-align:center;font-size:13px;transition:all .2s;}
.topic-btn.active{border-color:var(--primary);background:rgba(108,92,231,0.08);}
.topic-btn .emoji{font-size:24px;display:block;margin-bottom:4px;}
/* Word list */
.word-list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.word-list-item:last-child{border:none;}
.wl-word{font-weight:600;font-size:15px;}
.wl-meaning{font-size:13px;color:var(--text2);}
.wl-status{font-size:11px;padding:3px 8px;border-radius:8px;font-weight:600;}
.wl-new{background:#E3F2FD;color:#1565C0;}
.wl-learning{background:#FFF3E0;color:#E65100;}
.wl-mastered{background:#E8F5E9;color:#2E7D32;}
/* Today panel */
.today-panel{background:linear-gradient(135deg,rgba(108,92,231,0.08),rgba(116,185,255,0.08));border-radius:var(--radius);padding:16px;margin:12px 0;border:1px solid var(--border);}
.today-panel h3{font-size:15px;margin-bottom:8px;}
.today-words{display:flex;flex-wrap:wrap;gap:6px;}
.today-word-chip{padding:4px 10px;border-radius:8px;font-size:12px;background:var(--card);border:1px solid var(--border);}
.today-word-chip.done{background:var(--success);color:#fff;border-color:var(--success);}
/* Settings */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
.setting-row:last-child{border:none;}
.setting-label{font-size:14px;}
.setting-val{font-size:14px;color:var(--primary);font-weight:600;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>🌟 KET Word Master</h1>
    <div class="sub" id="dateInfo"></div>
    <div id="streakBadge" class="streak-badge hidden">🔥 0 天连续打卡</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="num" id="sToday">0</div><div class="label">今日完成</div></div>
    <div class="stat"><div class="num" id="sStreak">0</div><div class="label">连续打卡</div></div>
    <div class="stat"><div class="num" id="sMastered">0</div><div class="label">已掌握</div></div>
    <div class="stat"><div class="num" id="sTotal">0</div><div class="label">总词数</div></div>
  </div>

  <div class="tabs" id="mainTabs">
    <button class="tab active" data-mode="home">🏠 首页</button>
    <button class="tab" data-mode="learn">👀 认词</button>
    <button class="tab" data-mode="quiz">📝 选择</button>
    <button class="tab" data-mode="spell">✍️ 拼写</button>
    <button class="tab" data-mode="fill">🧩 填空</button>
    <button class="tab" data-mode="wordlist">📖 词表</button>
  </div>

  <!-- HOME -->
  <div id="mode-home" class="card">
    <div class="today-panel">
      <h3>📅 今日任务</h3>
      <div id="todayNewLabel" style="font-size:13px;color:var(--text2);margin:6px 0;">新词：</div>
      <div class="today-words" id="todayNewWords"></div>
      <div id="todayRevLabel" style="font-size:13px;color:var(--text2);margin:8px 0 6px;">复习：</div>
      <div class="today-words" id="todayRevWords"></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startDailySession()">🚀 开始学习！</button>
    </div>
    <div style="margin-top:16px;text-align:center;">
      <button class="btn btn-outline btn-sm" onclick="switchMode('wordlist')">📖 浏览词表</button>
      <button class="btn btn-outline btn-sm" style="margin-left:8px;" onclick="resetConfirm()">🗑️ 重置</button>
    </div>
  </div>

  <!-- LEARN -->
  <div id="mode-learn" class="card hidden">
    <div class="progress-bar"><div class="fill" id="learnFill"></div></div>
    <div style="text-align:center;">
      <button class="speaker-btn" onclick="speakCurrent()">🔊</button>
    </div>
    <div class="word-big" id="lWord"></div>
    <div class="phonetic" id="lPhonetic"></div>
    <div style="text-align:center;margin:6px 0;"><span class="pos-tag" id="lPos"></span></div>
    <div class="meaning-text" id="lMeaning"></div>
    <div class="example-box" id="lExample"></div>
    <div class="btn-group" style="margin-top:8px;">
      <button class="btn btn-outline btn-sm" onclick="speakExample2()">🔊 朗读例句</button>
    </div>
    <div class="nav-row">
      <button class="btn btn-outline btn-sm" onclick="learnPrev()">←</button>
      <span class="counter" id="lCounter"></span>
      <button class="btn btn-primary btn-sm" onclick="learnNext()">→</button>
    </div>
    <div class="btn-group">
      <button class="btn btn-success btn-sm" onclick="learnMark(true)">👍 认识</button>
      <button class="btn btn-danger btn-sm" onclick="learnMark(false)">🤔 不认识</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="mode-quiz" class="card hidden">
    <div class="progress-bar"><div class="fill" id="quizFill"></div></div>
    <div style="text-align:center;"><button class="speaker-btn" onclick="speakQuiz()">🔊</button></div>
    <div class="word-big" id="qWord"></div>
    <div class="quiz-options" id="qOpts"></div>
    <div class="nav-row">
      <span class="counter" id="qCounter"></span>
      <span id="qScore" style="font-weight:bold;color:var(--primary);"></span>
    </div>
  </div>

  <!-- SPELL -->
  <div id="mode-spell" class="card hidden">
    <div class="progress-bar"><div class="fill" id="spellFill"></div></div>
    <div style="text-align:center;"><button class="speaker-btn" onclick="speakSpell()">🔊</button></div>
    <div class="meaning-text" style="font-size:22px;" id="spMeaning"></div>
    <div class="phonetic" id="spHint" style="margin:6px 0;"></div>
    <div class="input-area">
      <input id="spInput" placeholder="Type the word..." autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="checkSpell()">✓ Check</button>
      <button class="btn btn-outline btn-sm" onclick="showSpellHint()">💡 Hint</button>
    </div>
    <div id="spResult" style="text-align:center;margin-top:10px;font-size:15px;"></div>
    <div class="nav-row">
      <span class="counter" id="spCounter"></span>
      <span id="spScore" style="font-weight:bold;color:var(--primary);"></span>
    </div>
  </div>

  <!-- FILL -->
  <div id="mode-fill" class="card hidden">
    <div class="progress-bar"><div class="fill" id="fillFill"></div></div>
    <div class="sentence-fill" id="fillSentence"></div>
    <div class="input-area">
      <input id="fillInput" placeholder="Fill in the blank..." autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="checkFill()">✓ Check</button>
      <button class="btn btn-outline btn-sm" onclick="speakFillSentence()">🔊</button>
    </div>
    <div id="fillResult" style="text-align:center;margin-top:10px;font-size:15px;"></div>
    <div class="nav-row">
      <span class="counter" id="fillCounter"></span>
      <span id="fillScore" style="font-weight:bold;color:var(--primary);"></span>
    </div>
  </div>

  <!-- WORDLIST -->
  <div id="mode-wordlist" class="card hidden">
    <div style="font-size:15px;font-weight:600;margin-bottom:10px;">📖 词表浏览</div>
    <div class="topic-grid" id="topicGrid"></div>
    <div id="wordListContainer" style="margin-top:12px;max-height:60vh;overflow-y:auto;"></div>
  </div>
</div>

// De-duplicate by word
const seen = new Set();
const WORDS = [];
VOCAB.forEach(v => { if(!seen.has(v.w)){seen.add(v.w);WORDS.push(v);} });

const TOPICS = [...new Set(WORDS.map(w=>w.t))];
const TOPIC_EMOJI = {Family:"👨‍👩‍👧‍👦",School:"🏫",Food:"🍔",Animals:"🐾",Sports:"⚽",Daily:"🏠",Travel:"✈️",Weather:"🌤️",Body:"💪",Feelings:"😊",Actions:"🏃",Places:"🏛️",Other:"📦"};
const NEW_PER_DAY = 10;
const STORAGE_KEY = "ket_word_master_v1";

// ==================== SM-2 Algorithm ====================
function defaultCard(wordIdx){
  return {idx:wordIdx, ef:2.5, interval:0, reps:0, nextReview:0, lastReview:0};
}
function sm2Update(card, quality){
  // quality: 0-5, >=3 = correct
  if(quality < 3){
    card.reps = 0;
    card.interval = 1;
  } else {
    card.reps++;
    if(card.reps===1) card.interval=1;
    else if(card.reps===2) card.interval=3;
    else card.interval = Math.round(card.interval * card.ef);
  }
  card.ef = Math.max(1.3, card.ef + (0.1 - (5-quality)*(0.08+(5-quality)*0.02)));
  const now = todayNum();
  card.lastReview = now;
  card.nextReview = now + card.interval;
  return card;
}
function todayNum(){
  const d = new Date();
  return Math.floor(d.getTime()/86400000);
}
function todayStr(){
  return new Date().toISOString().slice(0,10);
}

// ==================== STATE ====================
let state;
function loadState(){
  try{ state = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e){}
  if(!state) state = {};
  if(!state.cards) state.cards = {};
  if(!state.unlocked) state.unlocked = 0;
  if(!state.todayDone) state.todayDone = [];
  if(!state.lastDate) state.lastDate = "";
  if(!state.streak) state.streak = 0;
  if(!state.totalDays) state.totalDays = 0;
  checkNewDay();
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function checkNewDay(){
  const today = todayStr();
  if(state.lastDate !== today){
    const yest = new Date(Date.now()-86400000).toISOString().slice(0,10);
    if(state.lastDate === yest && state.todayDone.length > 0){
      state.streak++;
    } else if(state.lastDate && state.lastDate !== yest){
      state.streak = 0;
    }
    // Unlock new words
    state.unlocked = Math.min(WORDS.length, state.unlocked + NEW_PER_DAY);
    state.todayDone = [];
    state.lastDate = today;
    saveState();
  }
  if(state.unlocked === 0){
    state.unlocked = NEW_PER_DAY;
    saveState();
  }
}
function getCard(idx){
  if(!state.cards[idx]) state.cards[idx] = defaultCard(idx);
  return state.cards[idx];
}
function isMastered(idx){
  const c = getCard(idx);
  return c.reps >= 4 && c.interval >= 7;
}

// ==================== TODAY'S WORDS ====================
function getTodayNew(){
  // Latest unlocked batch
  const start = Math.max(0, state.unlocked - NEW_PER_DAY);
  const end = state.unlocked;
  return Array.from({length:end-start},(_,i)=>start+i).filter(i=>i<WORDS.length);
}
function getTodayReview(){
  const now = todayNum();
  const rev = [];
  for(let i=0;i<state.unlocked && i<WORDS.length;i++){
    const c = getCard(i);
    if(c.lastReview > 0 && c.nextReview <= now && !getTodayNew().includes(i)){
      rev.push(i);
    }
  }
  return rev.slice(0, 20); // cap at 20 review words
}
function getTodayAll(){
  return [...getTodayNew(), ...getTodayReview()];
}

// ==================== SPEECH ====================
function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

// ==================== REWARD EFFECTS ====================
function showConfetti(){
  const overlay = document.createElement('div');
  overlay.className = 'reward-overlay';
  const colors = ['#6C5CE7','#FF6B6B','#FDCB6E','#00B894','#74B9FF','#FD79A8'];
  for(let i=0;i<30;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100+'%';
    c.style.top = '-10px';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDelay = Math.random()*0.5+'s';
    c.style.width = (6+Math.random()*8)+'px';
    c.style.height = (6+Math.random()*8)+'px';
    overlay.appendChild(c);
  }
  document.body.appendChild(overlay);
  setTimeout(()=>overlay.remove(),2500);
}
function showStar(emoji){
  const s = document.createElement('div');
  s.className = 'star-burst';
  s.textContent = emoji || '⭐';
  document.body.appendChild(s);
  setTimeout(()=>s.remove(), 900);
}
function celebrate(){
  showConfetti();
  showStar(['🌟','🎉','🏆','💯','👏','🥳'][Math.floor(Math.random()*6)]);
}

// ==================== UI ====================
let currentMode = 'home';
let sessionWords = [];
let sessionIdx = 0;
let quizCorrect = 0;
let spellCorrect = 0;
let fillCorrect = 0;
let answered = false;

function $(id){ return document.getElementById(id); }

function switchMode(mode){
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.mode===mode));
  ['home','learn','quiz','spell','fill','wordlist'].forEach(m=>{
    $('mode-'+m).classList.toggle('hidden', m!==mode);
  });
  if(mode==='home') renderHome();
  if(mode==='wordlist') renderWordList();
}

// Tab clicks
$('mainTabs').addEventListener('click',e=>{
  const tab = e.target.closest('.tab');
  if(tab && tab.dataset.mode) switchMode(tab.dataset.mode);
});

function renderHome(){
  const newW = getTodayNew();
  const revW = getTodayReview();
  $('todayNewWords').innerHTML = newW.map(i=>`<span class="today-word-chip${state.todayDone.includes(i)?' done':''}">${WORDS[i].w}</span>`).join('');
  $('todayRevWords').innerHTML = revW.length ? revW.map(i=>`<span class="today-word-chip${state.todayDone.includes(i)?' done':''}">${WORDS[i].w}</span>`).join('') : '<span style="font-size:12px;color:var(--text2);">暂无复习词</span>';
  updateStats();
}

function updateStats(){
  $('sToday').textContent = state.todayDone.length;
  $('sStreak').textContent = state.streak;
  const mastered = Object.values(state.cards).filter(c=>c.reps>=4&&c.interval>=7).length;
  $('sMastered').textContent = mastered;
  $('sTotal').textContent = WORDS.length;
  if(state.streak > 0){
    $('streakBadge').classList.remove('hidden');
    $('streakBadge').textContent = `🔥 ${state.streak} 天连续打卡`;
  } else {
    $('streakBadge').classList.add('hidden');
  }
  const d = new Date();
  $('dateInfo').textContent = d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}

function startDailySession(){
  sessionWords = getTodayAll();
  if(sessionWords.length === 0){
    alert("今天没有新词了，太棒了！🎉");
    return;
  }
  sessionIdx = 0;
  switchMode('learn');
  renderLearn();
}

// ==================== LEARN MODE ====================
function renderLearn(){
  if(sessionIdx >= sessionWords.length){
    // Finished learning, go to quiz
    switchMode('quiz');
    quizCorrect = 0;
    sessionIdx = 0;
    shuffle(sessionWords);
    renderQuiz();
    return;
  }
  const wIdx = sessionWords[sessionIdx];
  const w = WORDS[wIdx];
  $('learnFill').style.width = ((sessionIdx+1)/sessionWords.length*100)+'%';
  $('lWord').textContent = w.w;
  $('lPhonetic').textContent = w.ph || '';
  $('lPos').textContent = w.p;
  $('lMeaning').textContent = w.m;
  const ex = w.e.replace(new RegExp(`(${w.w})`,'gi'),'<span class="highlight">$1</span>');
  $('lExample').innerHTML = ex;
  $('lCounter').textContent = `${sessionIdx+1} / ${sessionWords.length}`;
  speak(w.w);
}
function speakCurrent(){
  const w = WORDS[sessionWords[sessionIdx]];
  if(w) speak(w.w);
}
function speakExample2(){
  const w = WORDS[sessionWords[sessionIdx]];
  if(w) speak(w.e);
}
function learnPrev(){ if(sessionIdx>0){sessionIdx--;renderLearn();} }
function learnNext(){ sessionIdx++;renderLearn(); }
function learnMark(known){
  const wIdx = sessionWords[sessionIdx];
  const card = getCard(wIdx);
  sm2Update(card, known ? 4 : 1);
  if(!state.todayDone.includes(wIdx)) state.todayDone.push(wIdx);
  saveState();
  if(known) showStar('👍');
  sessionIdx++;
  renderLearn();
}

// ==================== QUIZ MODE ====================
function renderQuiz(){
  if(sessionIdx >= sessionWords.length){
    const pct = Math.round(quizCorrect/sessionWords.length*100);
    $('mode-quiz').innerHTML = `<div style="text-align:center;padding:30px 0;">
      <div style="font-size:48px;margin-bottom:16px;">${pct>=80?'🏆':pct>=60?'👍':'💪'}</div>
      <div style="font-size:22px;font-weight:bold;">选择题完成！</div>
      <div style="font-size:16px;color:var(--text2);margin:8px 0;">正确率: ${pct}% (${quizCorrect}/${sessionWords.length})</div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="startSpellMode()">✍️ 继续拼写</button>
        <button class="btn btn-outline" onclick="switchMode('home')">🏠 首页</button>
      </div>
    </div>`;
    if(pct >= 80) celebrate();
    return;
  }
  answered = false;
  const wIdx = sessionWords[sessionIdx];
  const w = WORDS[wIdx];
  $('quizFill').style.width = ((sessionIdx+1)/sessionWords.length*100)+'%';
  $('qWord').textContent = w.w;
  $('qCounter').textContent = `${sessionIdx+1} / ${sessionWords.length}`;
  $('qScore').textContent = `✓${quizCorrect}`;
  // Generate options
  const correct = w.m;
  const wrongs = WORDS.filter((_,i)=>i!==wIdx).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.m);
  const opts = shuffle([correct, ...wrongs]);
  $('qOpts').innerHTML = opts.map(o=>`<div class="quiz-opt" onclick="pickQuiz(this,'${escHtml(o)}','${escHtml(correct)}')">${o}</div>`).join('');
  speak(w.w);
}
function speakQuiz(){
  const w = WORDS[sessionWords[sessionIdx]];
  if(w) speak(w.w);
}
function pickQuiz(el, picked, correct){
  if(answered) return;
  answered = true;
  const isCorrect = picked === correct;
  el.classList.add(isCorrect?'correct':'wrong');
  if(isCorrect){
    quizCorrect++;
    showStar('✅');
    const card = getCard(sessionWords[sessionIdx]);
    sm2Update(card, 4);
  } else {
    // Highlight correct
    document.querySelectorAll('.quiz-opt').forEach(o=>{
      if(o.textContent===correct) o.classList.add('correct');
      o.classList.add('disabled');
    });
    const card = getCard(sessionWords[sessionIdx]);
    sm2Update(card, 1);
  }
  if(!state.todayDone.includes(sessionWords[sessionIdx])) state.todayDone.push(sessionWords[sessionIdx]);
  saveState();
  setTimeout(()=>{sessionIdx++;renderQuiz();},1200);
}

// ==================== SPELL MODE ====================
function startSpellMode(){
  sessionIdx = 0;
  spellCorrect = 0;
  shuffle(sessionWords);
  switchMode('spell');
  renderSpell();
}
function renderSpell(){
  if(sessionIdx >= sessionWords.length){
    const pct = Math.round(spellCorrect/sessionWords.length*100);
    $('mode-spell').innerHTML = `<div style="text-align:center;padding:30px 0;">
      <div style="font-size:48px;margin-bottom:16px;">${pct>=80?'🌟':pct>=60?'👍':'💪'}</div>
      <div style="font-size:22px;font-weight:bold;">拼写完成！</div>
      <div style="font-size:16px;color:var(--text2);margin:8px 0;">正确率: ${pct}% (${spellCorrect}/${sessionWords.length})</div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="startFillMode()">🧩 继续填空</button>
        <button class="btn btn-outline" onclick="switchMode('home')">🏠 首页</button>
      </div>
    </div>`;
    if(pct >= 80) celebrate();
    return;
  }
  answered = false;
  const w = WORDS[sessionWords[sessionIdx]];
  $('spellFill').style.width = ((sessionIdx+1)/sessionWords.length*100)+'%';
  $('spMeaning').textContent = w.m;
  $('spHint').textContent = '';
  $('spInput').value = '';
  $('spResult').textContent = '';
  $('spCounter').textContent = `${sessionIdx+1} / ${sessionWords.length}`;
  $('spScore').textContent = `✓${spellCorrect}`;
  $('spInput').focus();
  speak(w.w);
}
function speakSpell(){
  const w = WORDS[sessionWords[sessionIdx]];
  if(w) speak(w.w);
}
function showSpellHint(){
  const w = WORDS[sessionWords[sessionIdx]];
  const hint = w.w[0] + '_'.repeat(w.w.length-1);
  $('spHint').textContent = `提示: ${hint} (${w.w.length}个字母)`;
}
function checkSpell(){
  if(answered) { sessionIdx++; renderSpell(); return; }
  answered = true;
  const w = WORDS[sessionWords[sessionIdx]];
  const input = $('spInput').value.trim().toLowerCase();
  const correct = w.w.toLowerCase();
  if(input === correct){
    spellCorrect++;
    $('spResult').innerHTML = `<span style="color:var(--success);">✅ 正确！<strong>${w.w}</strong></span>`;
    showStar('🎯');
    sm2Update(getCard(sessionWords[sessionIdx]), 5);
  } else {
    $('spResult').innerHTML = `<span style="color:var(--danger);">❌ 正确答案: <strong>${w.w}</strong></span>`;
    sm2Update(getCard(sessionWords[sessionIdx]), 1);
  }
  if(!state.todayDone.includes(sessionWords[sessionIdx])) state.todayDone.push(sessionWords[sessionIdx]);
  saveState();
  setTimeout(()=>{sessionIdx++;renderSpell();},1500);
}
$('spInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') checkSpell();
});

// ==================== FILL MODE ====================
function startFillMode(){
  sessionIdx = 0;
  fillCorrect = 0;
  shuffle(sessionWords);
  switchMode('fill');
  renderFill();
}
function renderFill(){
  if(sessionIdx >= sessionWords.length){
    const pct = Math.round(fillCorrect/sessionWords.length*100);
    $('mode-fill').innerHTML = `<div style="text-align:center;padding:30px 0;">
      <div style="font-size:48px;margin-bottom:16px;">${pct>=80?'🎊':pct>=60?'👍':'💪'}</div>
      <div style="font-size:22px;font-weight:bold;">今日学习完成！</div>
      <div style="font-size:16px;color:var(--text2);margin:8px 0;">填空正确率: ${pct}% (${fillCorrect}/${sessionWords.length})</div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="switchMode('home')">🏠 返回首页</button>
      </div>
    </div>`;
    if(pct >= 60){ celebrate(); state.streak = Math.max(state.streak,1); saveState(); }
    return;
  }
  answered = false;
  const w = WORDS[sessionWords[sessionIdx]];
  const sentence = w.e.replace(new RegExp(`\\b${w.w}\\b`,'i'), '<span class="blank-slot" id="blankSlot">______</span>');
  $('fillFill').style.width = ((sessionIdx+1)/sessionWords.length*100)+'%';
  $('fillSentence').innerHTML = sentence;
  $('fillInput').value = '';
  $('fillResult').textContent = '';
  $('fillCounter').textContent = `${sessionIdx+1} / ${sessionWords.length}`;
  $('fillScore').textContent = `✓${fillCorrect}`;
  $('fillInput').focus();
}
function speakFillSentence(){
  const w = WORDS[sessionWords[sessionIdx]];
  if(w) speak(w.e);
}
function checkFill(){
  if(answered){ sessionIdx++; renderFill(); return; }
  answered = true;
  const w = WORDS[sessionWords[sessionIdx]];
  const input = $('fillInput').value.trim().toLowerCase();
  const correct = w.w.toLowerCase();
  const slot = $('blankSlot');
  if(input === correct){
    fillCorrect++;
    if(slot) slot.textContent = w.w;
    $('fillResult').innerHTML = `<span style="color:var(--success);">✅ 正确！</span>`;
    showStar('💯');
    sm2Update(getCard(sessionWords[sessionIdx]), 5);
  } else {
    if(slot) slot.textContent = w.w;
    $('fillResult').innerHTML = `<span style="color:var(--danger);">❌ 答案: <strong>${w.w}</strong> (${w.m})</span>`;
    sm2Update(getCard(sessionWords[sessionIdx]), 1);
  }
  if(!state.todayDone.includes(sessionWords[sessionIdx])) state.todayDone.push(sessionWords[sessionIdx]);
  saveState();
  setTimeout(()=>{sessionIdx++;renderFill();},1500);
}
$('fillInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') checkFill();
});

// ==================== WORDLIST ====================
let selectedTopic = null;
function renderWordList(){
  $('topicGrid').innerHTML = [{t:null,label:'全部',emoji:'📚'},...TOPICS.map(t=>({t,label:t,emoji:TOPIC_EMOJI[t]||'📦'}))].map(({t,label,emoji})=>
    `<div class="topic-btn${selectedTopic===t?' active':''}" onclick="selectTopic(${t===null?'null':"'"+t+"'"})"><span class="emoji">${emoji}</span>${label}</div>`
  ).join('');
  const filtered = selectedTopic ? WORDS.filter(w=>w.t===selectedTopic) : WORDS;
  $('wordListContainer').innerHTML = filtered.map((w,i)=>{
    const realIdx = WORDS.indexOf(w);
    const card = getCard(realIdx);
    let status='wl-new', statusText='新词';
    if(card.reps>=4&&card.interval>=7){status='wl-mastered';statusText='已掌握';}
    else if(card.reps>0){status='wl-learning';statusText='学习中';}
    return `<div class="word-list-item" onclick="speak('${w.w}')">
      <div><div class="wl-word">${w.w} <span style="font-size:12px;color:var(--text2);">${w.p}</span></div><div class="wl-meaning">${w.m}</div></div>
      <span class="wl-status ${status}">${statusText}</span>
    </div>`;
  }).join('');
}
function selectTopic(t){
  selectedTopic = t;
  renderWordList();
}

// ==================== UTILS ====================
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function escHtml(s){return s.replace(/'/g,"\\'").replace(/"/g,"&quot;");}

function resetConfirm(){
  if(confirm("确定要重置所有学习进度吗？此操作不可恢复！")){
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}

// ==================== INIT ====================
loadState();
renderHome();
updateStats();
</script>
</body>
