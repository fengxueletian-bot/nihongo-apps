<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta name="google" content="notranslate">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N2単語マスター</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 16px; }
.header { text-align: center; padding: 20px 0; }
.header h1 { font-size: 24px; color: #1a1a2e; }
.header .day-info { color: #666; margin-top: 8px; font-size: 14px; }
.stats { display: flex; justify-content: space-around; background: white; border-radius: 12px; padding: 16px; margin: 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.stat { text-align: center; }
.stat .num { font-size: 24px; font-weight: bold; color: #4361ee; }
.stat .label { font-size: 12px; color: #666; margin-top: 4px; }
.tabs { display: flex; gap: 8px; margin: 16px 0; overflow-x: auto; padding-bottom: 4px; }
.tab { padding: 10px 14px; border-radius: 20px; border: none; background: white; color: #333; font-size: 13px; cursor: pointer; white-space: nowrap; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.tab.active { background: #4361ee; color: white; }
.card { background: white; border-radius: 16px; padding: 24px; margin: 16px 0; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.word-display { text-align: center; padding: 20px 0; }
.word-display .word { font-size: 36px; font-weight: bold; color: #1a1a2e; }
.word-display .reading { font-size: 18px; color: #4361ee; margin-top: 8px; }
.word-display .meaning { font-size: 16px; color: #666; margin-top: 12px; }
.word-display .example { font-size: 14px; color: #444; margin-top: 16px; padding: 12px; background: #f8f9fa; border-radius: 8px; text-align: left; line-height: 1.8; }
.word-display .collocation { font-size: 13px; color: #e63946; margin-top: 8px; font-weight: 500; }
.ruby-text { font-size: inherit; }
.ruby-text rt { font-size: 0.6em; color: #4361ee; }
.btn { padding: 12px 24px; border-radius: 10px; border: none; font-size: 15px; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: #4361ee; color: white; }
.btn-primary:hover { background: #3651d4; }
.btn-success { background: #2ec4b6; color: white; }
.btn-danger { background: #e63946; color: white; }
.btn-outline { background: white; border: 2px solid #4361ee; color: #4361ee; }
.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
.progress-bar { height: 6px; background: #e9ecef; border-radius: 3px; margin: 12px 0; }
.progress-bar .fill { height: 100%; background: #4361ee; border-radius: 3px; transition: width 0.3s; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.quiz-option { padding: 14px 18px; border: 2px solid #e9ecef; border-radius: 10px; cursor: pointer; text-align: left; font-size: 15px; transition: all 0.2s; }
.quiz-option:hover { border-color: #4361ee; background: #f0f3ff; }
.quiz-option.correct { border-color: #2ec4b6; background: #e8faf8; }
.quiz-option.wrong { border-color: #e63946; background: #fde8ea; }
.input-area { margin-top: 16px; }
.input-area input { width: 100%; padding: 14px; border: 2px solid #e9ecef; border-radius: 10px; font-size: 16px; outline: none; }
.input-area input:focus { border-color: #4361ee; }
.recording-area { text-align: center; margin-top: 20px; }
.record-btn { width: 72px; height: 72px; border-radius: 50%; border: none; background: #e63946; color: white; font-size: 24px; cursor: pointer; transition: all 0.2s; }
.record-btn.recording { background: #333; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
.score-display { margin-top: 16px; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; }
.score-good { background: #e8faf8; color: #2ec4b6; }
.score-ok { background: #fff3cd; color: #856404; }
.score-bad { background: #fde8ea; color: #e63946; }
.review-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; }
.review-item .word-info .jp { font-size: 16px; font-weight: 500; }
.review-item .word-info .cn { font-size: 13px; color: #666; }
.review-item .status { font-size: 12px; padding: 4px 8px; border-radius: 4px; }
.status-new { background: #e3f2fd; color: #1565c0; }
.status-learning { background: #fff3e0; color: #e65100; }
.status-review { background: #e8f5e9; color: #2e7d32; }
.hidden { display: none; }
.nav-arrows { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
.nav-arrows .counter { font-size: 14px; color: #666; }
.speaker-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 8px; }
.speaker-btn-sm { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px 8px; }
.chapter-select { width: 100%; padding: 10px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 14px; margin: 8px 0; }
.shadow-target { margin: 12px 0; padding: 16px; background: #f8f9fa; border-radius: 10px; text-align: center; }
.shadow-target .main-text { font-size: 20px; line-height: 1.8; }
.shadow-target .sub-text { font-size: 13px; color: #666; margin-top: 8px; }
.mode-toggle { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
.mode-toggle .toggle-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid #ddd; background: #f8f9fa; font-size: 13px; cursor: pointer; }
.mode-toggle .toggle-btn.active { background: #4361ee; color: white; border-color: #4361ee; }
.score-detail { font-size: 13px; color: #666; margin-top: 8px; line-height: 1.6; }
.jlpt-question { padding: 16px; background: #f8f9fa; border-radius: 10px; margin: 12px 0; }
.jlpt-question .q-text { font-size: 15px; line-height: 1.8; }
.jlpt-question .q-num { font-size: 12px; color: #4361ee; font-weight: bold; margin-bottom: 8px; }

/* Sync modal */
.sync-btn{position:fixed;bottom:16px;right:16px;width:48px;height:48px;border-radius:50%;background:#4361ee;color:#fff;border:none;font-size:22px;box-shadow:0 2px 12px rgba(67,97,238,.4);z-index:999;cursor:pointer}
.sync-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.sync-modal.show{display:flex}
.sync-box{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:360px;max-height:80vh;overflow-y:auto}
.sync-box h3{margin-bottom:16px;font-size:16px}
.sync-box textarea{width:100%;height:120px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:12px;margin:8px 0}
.sync-box .btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin:6px 0}
.sync-box .btn-export{background:#4361ee;color:#fff}
.sync-box .btn-import{background:#2ec4b6;color:#fff}
.sync-box .btn-close{background:#eee;color:#333}
.sync-msg{text-align:center;padding:8px;font-size:13px;color:#2ec4b6;display:none}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📚 N2単語マスター</h1>
    <div class="day-info" id="dayInfo">Day 1 - 1章1課 親類・友人・知人</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="num" id="statTotal">0</div><div class="label">总词数</div></div>
    <div class="stat"><div class="num" id="statLearned">0</div><div class="label">已学</div></div>
    <div class="stat"><div class="num" id="statMastered">0</div><div class="label">已掌握</div></div>
    <div class="stat"><div class="num" id="statReview">0</div><div class="label">待复习</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchMode('learn')">📖 学习</button>
    <button class="tab" onclick="switchMode('quiz')">📝 测试</button>
    <button class="tab" onclick="switchMode('spell')">✍️ 拼写</button>
    <button class="tab" onclick="switchMode('shadow')">🎤 跟读</button>
    <button class="tab" onclick="switchMode('jlpt')">🎯 真题</button>
    <button class="tab" onclick="switchMode('review')">🔄 复习</button>
    <button class="tab" onclick="switchMode('cloze')">🧠 填空</button>
    <button class="tab" onclick="switchMode('errors')">❌ 错题</button>
  </div>

  <!-- ============ 学习模式 ============ -->
  <div id="mode-learn" class="card">
    <select class="chapter-select" id="chapterSelect" onchange="changeChapter()">
      <option value="1-1">1章1課 親類・友人・知人</option>
      <option value="1-2">1章2課 人の性格・特徴</option>
      <option value="1-3">1章3課 人に対する感情・行動</option>
      <option value="2-1">2章1課 食生活</option>
      <option value="2-2">2章2課 家事</option>
      <option value="2-3">2章3課 健康</option>
    </select>
    <div class="progress-bar"><div class="fill" id="learnProgress" style="width:0%"></div></div>
    <div class="word-display">
      <div class="word" id="learnWord"></div>
      <div class="reading" id="learnReading"></div>
      <div class="collocation" id="learnCollocation"></div>
      <div class="meaning" id="learnMeaning"></div>
      <div class="example" id="learnExample"></div>
    </div>
    <div class="btn-group" style="margin-top:12px">
      <button class="btn btn-outline btn-sm" onclick="speakWord()">🔊 单词</button>
      <button class="btn btn-outline btn-sm" onclick="speakExample()">🔊 例句</button>
    </div>
    <div class="nav-arrows">
      <button class="btn btn-outline" onclick="prevWord()">← 上一个</button>
      <span class="counter" id="learnCounter">1 / 30</span>
      <button class="btn btn-primary" onclick="nextWord()">下一个 →</button>
    </div>
    <div style="text-align:center;margin-top:8px"><button class="btn btn-outline btn-sm" onclick="restartLearn()">🔄 从头开始</button></div>
    <div class="btn-group" style="margin-top:16px">
      <button class="btn btn-success" onclick="markWord('known')">✓ 认识</button>
      <button class="btn btn-danger" onclick="markWord('unknown')">✗ 不认识</button>
    </div>
  </div>

  <!-- ============ 测试模式 ============ -->
  <div id="mode-quiz" class="card hidden">
    <div class="progress-bar"><div class="fill" id="quizProgress" style="width:0%"></div></div>
    <div class="word-display">
      <button class="speaker-btn" onclick="speakQuizWord()">🔊</button>
      <div class="word" id="quizWord"></div>
      <div class="reading" id="quizReading" style="visibility:hidden"></div>
    </div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="nav-arrows">
      <span class="counter" id="quizCounter">1 / 10</span>
      <span id="quizScore" style="color:#4361ee;font-weight:bold"></span>
    </div>
  </div>

  <!-- ============ 拼写模式 ============ -->
  <div id="mode-spell" class="card hidden">
    <div class="progress-bar"><div class="fill" id="spellProgress" style="width:0%"></div></div>
    <div class="word-display">
      <div class="meaning" style="font-size:20px" id="spellMeaning"></div>
      <div class="collocation" id="spellHint"></div>
    </div>
    <div class="input-area">
      <input type="text" id="kanaInput" placeholder="请输入假名..." onkeydown="handleKanaKey(event)">
      <div class="btn-group">
        <button class="btn btn-primary" onclick="checkKana()">确认</button>
        <button class="btn btn-outline btn-sm" onclick="speakSpellWord()">🔊 朗读</button>
        <button class="btn btn-outline btn-sm" onclick="showKanaHint()">💡 提示</button>
      </div>
      <div id="kanaResult" style="margin-top:12px;text-align:center;font-size:15px"></div>
      <div id="kanaNext" class="hidden" style="margin-top:12px;text-align:center">
        <span style="color:#999;font-size:13px">按回车进入下一题 →</span>
      </div>
    </div>
    <div class="nav-arrows">
      <span class="counter" id="spellCounter">1 / 10</span>
      <span id="spellScore" style="color:#4361ee;font-weight:bold"></span>
    </div>
  </div>

  <!-- ============ 跟读模式 ============ -->
  <div id="mode-shadow" class="card hidden">
    <div class="mode-toggle">
      <button class="toggle-btn active" id="shadowModeWord" onclick="setShadowMode('word')">单词跟读</button>
      <button class="toggle-btn" id="shadowModeSentence" onclick="setShadowMode('sentence')">例句跟读</button>
    </div>
    <div class="shadow-target">
      <div class="main-text" id="shadowMainText"></div>
      <div class="sub-text" id="shadowSubText"></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-outline btn-sm" onclick="playShadowTarget()">🔊 播放</button>
    </div>
    <div class="recording-area">
      <p style="margin-bottom:12px;color:#666;font-size:13px">点击录音，跟读上方内容<br><span style="font-size:11px;color:#999">⚠️ 当前为浏览器合成语音，仅供参考发音。语调训练建议配合真人音频。</span></p>
      <button class="record-btn" id="recordBtn" onclick="toggleRecording()">🎤</button>
      <div id="shadowResult" class="score-display hidden"></div>
      <div id="shadowDetail" class="score-detail hidden"></div>
      <div id="recognizedText" style="margin-top:8px;font-size:14px;color:#666"></div>
    </div>
    <div class="nav-arrows">
      <button class="btn btn-outline" onclick="prevShadow()">←</button>
      <span class="counter" id="shadowCounter">1 / 30</span>
      <button class="btn btn-primary" onclick="nextShadow()">下一个 →</button>
    </div>
  </div>

  <!-- ============ 真题训练 ============ -->
  <div id="mode-jlpt" class="card hidden">
    <h3 style="margin-bottom:12px">🎯 真题训练</h3>
    <p style="font-size:13px;color:#666;margin-bottom:16px">根据今日学习内容，精选N2真题高频考点</p>
    <div class="progress-bar"><div class="fill" id="jlptProgress" style="width:0%"></div></div>
    <div class="jlpt-question" id="jlptQuestion"></div>
    <div class="quiz-options" id="jlptOptions"></div>
    <div id="jlptExplanation" class="hidden" style="margin-top:12px;padding:12px;background:#f0f3ff;border-radius:8px;font-size:14px;line-height:1.8"></div>
    <div class="nav-arrows">
      <button class="btn btn-outline btn-sm" onclick="prevJlpt()">← 上一题</button>
      <span class="counter" id="jlptCounter">1 / 10</span>
      <button class="btn btn-primary btn-sm" id="jlptNextBtn" onclick="nextJlptManual()" style="display:none">下一题 →</button>
    </div>
    <div style="text-align:center;margin-top:8px"><span id="jlptScore" style="color:#4361ee;font-weight:bold"></span></div>
  </div>

  <!-- ============ 填空回忆模式 ============ -->
  <div id="mode-cloze" class="card hidden">
    <h3 style="margin-bottom:8px">🧠 填空回忆</h3>
    <p style="font-size:12px;color:#666;margin-bottom:16px">看例句猜单词，主动回忆比选择题记忆效果强3-5倍</p>
    <div class="progress-bar"><div class="fill" id="clozeProgress" style="width:0%"></div></div>
    <div class="word-display">
      <div class="example" id="clozeSentence" style="font-size:18px;line-height:2;text-align:center"></div>
      <div id="clozeHintArea" style="margin-top:12px;text-align:center;color:#666;font-size:13px"></div>
    </div>
    <div class="input-area">
      <input type="text" id="clozeInput" placeholder="输入答案（假名或汉字）..." onkeydown="handleClozeKey(event)">
      <div class="btn-group">
        <button class="btn btn-primary" onclick="checkCloze()">确认</button>
        <button class="btn btn-outline btn-sm" onclick="clozeMeaning()">💡 看意思</button>
        <button class="btn btn-outline btn-sm" onclick="clozeReveal()">👁 揭示答案</button>
      </div>
      <div id="clozeResult" style="margin-top:12px;text-align:center;font-size:15px"></div>
    </div>
    <div class="nav-arrows">
      <button class="btn btn-outline" onclick="prevCloze()">←</button>
      <span class="counter" id="clozeCounter">1 / 30</span>
      <button class="btn btn-primary" onclick="nextCloze()">下一题 →</button>
    </div>
    <div style="text-align:center;margin-top:8px"><span id="clozeScore" style="color:#4361ee;font-weight:bold"></span></div>
  </div>

  <!-- ============ 复习模式 ============ -->
  <div id="mode-review" class="card hidden">
    <h3 style="margin-bottom:16px">📅 今日复习（艾宾浩斯）</h3>
    <div style="font-size:13px;color:#666;margin-bottom:12px">
      复习间隔：20分→1小时→1天→2天→4天→7天→15天
    </div>
    <div id="reviewList"></div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startReview()">开始复习</button>
    </div>
  </div>

  <!-- ============ 错题本 ============ -->
  <div id="mode-errors" class="card hidden">
    <h3 style="margin-bottom:16px">❌ 错题本</h3>
    <div id="errorList"></div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="practiceErrors()">练习错题</button>
      <button class="btn btn-outline" onclick="clearErrors()">清空</button>
    </div>
  </div>
</div>

<script>
// ============ 词库数据（每课30词）============
const VOCABULARY = {
"1-1": { title: "1章1課 親類・友人・知人", words: [
    {word:"家族",reading:"かぞく",meaning:"家族/家人",collocation:"家族が多い",example:"私の家族は五人です。",exampleCn:"我的家人有五口人。"},
    {word:"親類",reading:"しんるい",meaning:"亲戚",collocation:"親類の集まり",example:"お正月に親類の集まりに行った。",exampleCn:"正月去参加了亲戚的聚会。"},
    {word:"祖先",reading:"そせん",meaning:"祖先",collocation:"祖先のお墓",example:"祖先のお墓参りをする。",exampleCn:"去祭扫祖先的墓。"},
    {word:"子孫",reading:"しそん",meaning:"子孙/后代",collocation:"子孫に伝える",example:"子孫に文化を伝える。",exampleCn:"将文化传给后代。"},
    {word:"祖父母",reading:"そふぼ",meaning:"祖父母",collocation:"祖父母の家",example:"祖父母から孫まで三世代で生活する。",exampleCn:"从祖父母到孙辈三代人一起生活。"},
    {word:"孫",reading:"まご",meaning:"孙子/孙女",collocation:"孫の顔を見る",example:"孫の顔を見るのが楽しみだ。",exampleCn:"期待着能见到孙子（女）。"},
    {word:"三世代",reading:"さんせだい",meaning:"三代",collocation:"三世代で暮らす",example:"三世代で一緒に暮らしている。",exampleCn:"三代人住在一起。"},
    {word:"一家",reading:"いっか",meaning:"一家/全家",collocation:"一家で出かける",example:"一家で出かける。",exampleCn:"全家一起出门。"},
    {word:"親孝行",reading:"おやこうこう",meaning:"孝顺父母",collocation:"親孝行をする",example:"親孝行をする息子だ。",exampleCn:"是个孝顺父母的儿子。"},
    {word:"実家",reading:"じっか",meaning:"老家/娘家",collocation:"実家に帰る",example:"実家が懐かしい。",exampleCn:"怀念老家。"},
    {word:"懐かしい",reading:"なつかしい",meaning:"怀念的/令人想念的",collocation:"懐かしい思い出",example:"子供の頃が懐かしい。",exampleCn:"怀念小时候。"},
    {word:"姉妹",reading:"しまい",meaning:"姐妹",collocation:"三人姉妹",example:"三人姉妹の末っ子です。",exampleCn:"是三姐妹中最小的。"},
    {word:"末っ子",reading:"すえっこ",meaning:"最小的孩子",collocation:"末っ子だから",example:"私は三人兄弟の末っ子だ。",exampleCn:"我是三兄弟中最小的。"},
    {word:"一人っ子",reading:"ひとりっこ",meaning:"独生子女",collocation:"一人っ子政策",example:"彼女は一人っ子だ。",exampleCn:"她是独生子女。"},
    {word:"双子",reading:"ふたご",meaning:"双胞胎",collocation:"双子の兄弟",example:"あの兄弟は双子だ。",exampleCn:"那两兄弟是双胞胎。"},
    {word:"仲良し",reading:"なかよし",meaning:"好朋友/关系好",collocation:"仲良しの友達",example:"子供の頃からの仲良しだ。",exampleCn:"从小就是好朋友。"},
    {word:"仕事仲間",reading:"しごとなかま",meaning:"同事/工作伙伴",collocation:"仕事仲間と飲む",example:"仕事仲間と飲みに行く。",exampleCn:"和同事去喝酒。"},
    {word:"知人",reading:"ちじん",meaning:"认识的人/熟人",collocation:"知人の紹介で",example:"知人・知り合いが多い。",exampleCn:"认识的人很多。"},
    {word:"知り合い",reading:"しりあい",meaning:"认识的人",collocation:"知り合いになる",example:"知り合いに偶然会った。",exampleCn:"偶然遇到了认识的人。"},

// ============ 状态管理 ============
let state = JSON.parse(localStorage.getItem('n2vocab_v2') || 'null') || {
  currentChapter: "1-1",
  currentIndex: 0,
  wordStatus: {},
  errors: [],
};
function saveState() { localStorage.setItem('n2vocab_v2', JSON.stringify(state)); }

// ============ TTS ============
function speak(text, rate=0.8) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP'; u.rate = rate;
    const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ja'));
    if (voices.length) u.voice = voices[0];
    speechSynthesis.speak(u);
  }
}
function speakWord() { const w = getCurrentWord(); speak(w.reading); }
function speakExample() { const w = getCurrentWord(); speak(w.example.replace(/（[^）]*）/g, ''), 0.7); }
function getCurrentWord() { return VOCABULARY[state.currentChapter].words[state.currentIndex]; }

// ============ 学习模式 ============
function skipToUnlearned() {
  const words = VOCABULARY[state.currentChapter].words;
  for (let i = 0; i < words.length; i++) {
    const key = state.currentChapter + '-' + i;
    if (!state.wordStatus[key]) { state.currentIndex = i; saveState(); return true; }
  }
  return false;
}
function updateLearnView() {
  const words = VOCABULARY[state.currentChapter].words;
  const w = words[state.currentIndex];
  document.getElementById('learnWord').innerHTML = addRuby(w.word, w.reading);
  document.getElementById('learnReading').textContent = w.reading;
  document.getElementById('learnMeaning').textContent = w.meaning;
  document.getElementById('learnCollocation').textContent = '【' + w.collocation + '】';
  document.getElementById('learnExample').innerHTML = `<div>${w.example}</div><div style="color:#666;margin-top:4px">${w.exampleCn}</div>`;
  document.getElementById('learnCounter').textContent = `${state.currentIndex + 1} / ${words.length}`;
  document.getElementById('learnProgress').style.width = ((state.currentIndex + 1) / words.length * 100) + '%';
  document.getElementById('dayInfo').textContent = VOCABULARY[state.currentChapter].title;
  // Update daily progress
  const todayKey = new Date().toDateString();
  const todayLearned = Object.entries(state.wordStatus).filter(([k,v]) => new Date(v.learnedAt).toDateString() === todayKey).length;
  const reviewCount = getReviewWords().length;
  document.getElementById('dayInfo').textContent = VOCABULARY[state.currentChapter].title + ' | 今日已学:' + todayLearned + '/30' + (reviewCount ? ' | 待复习:'+reviewCount : '');
}

function addRuby(word, reading) {
  if (word === reading) return word;
  return `<ruby>${word}<rt>${reading}</rt></ruby>`;
}

function nextWord() {
  const words = VOCABULARY[state.currentChapter].words;
  if (state.currentIndex >= words.length - 1) {
    if (confirm('🎉 本课30词学完！要进入测试吗？')) { switchMode('quiz'); return; }
  }
  state.currentIndex = Math.min(state.currentIndex + 1, words.length - 1);
  updateLearnView(); saveState();
  speakWord(); // Auto-speak new word
}
function prevWord() {
  state.currentIndex = Math.max(state.currentIndex - 1, 0);
  updateLearnView(); saveState();
}
function markTaskDone() {
  var today = new Date().toISOString().slice(0,10);
  localStorage.setItem('task_done_vocab_' + today, '1');
}
function markWord(status) {
  const key = state.currentChapter + '-' + state.currentIndex;
  if (!state.wordStatus[key]) state.wordStatus[key] = {};
  state.wordStatus[key].learnedAt = state.wordStatus[key].learnedAt || Date.now();
  state.wordStatus[key].status = status;
  sm2(state.wordStatus[key], status==='known' ? 4 : 1);
  if (status === 'unknown') {
    const w = getCurrentWord();
    const existingE = state.errors.find(e => e.word === w.word);
    if (existingE) { existingE.count=(existingE.count||1)+1; }
    else {
      state.errors.push({word:w.word, reading:w.reading, meaning:w.meaning, wrongAt:Date.now(), type:'learn'});
    }
  }
  nextWord(); updateStats(); saveState();
}
function restartLearn() {
  state.currentIndex = 0;
  updateLearnView(); saveState();
}
function changeChapter() {
  state.currentChapter = document.getElementById('chapterSelect').value;
  state.currentIndex = 0;
  if (!skipToUnlearned()) {
    if (confirm('🎉 本课已全部学完！要从头复习吗？')) { state.currentIndex = 0; }
  }
  updateLearnView(); saveState();
}

// ============ 测试模式（日中混合）============
let quizWords=[], quizIdx=0, quizScore=0;
function startQuiz() {
  if (!window._reviewMode) {
    const words = [...VOCABULARY[state.currentChapter].words];
    quizWords = words.sort(() => Math.random()-0.5).slice(0,30);
  }
  window._reviewMode = false;
  quizIdx = 0; quizScore = 0;
  showQuizQuestion();
}
function showQuizQuestion() {
  if (quizIdx >= quizWords.length) {
    markTaskDone();
    document.getElementById('quizOptions').innerHTML = `<div style="text-align:center;padding:20px"><h3>完成！${quizScore}/${quizWords.length}</h3><button class="btn btn-primary" onclick="startQuiz()">再来一轮</button><br><button onclick="quickExport()" style="margin-top:12px;padding:8px 16px;border:1.5px solid #4361ee;border-radius:8px;background:#fff;color:#4361ee;font-size:12px;cursor:pointer">☁️ 同步数据到其他设备</button></div>`;
    return;
  }
  const w = quizWords[quizIdx];
  // 50% 日→中, 50% 中→日
  const isJpToCn = Math.random() > 0.4;
  
  if (isJpToCn) {
    // Don't show reading together with kanji - prevent cheating
    if (w.word !== w.reading) {
      document.getElementById('quizWord').textContent = w.word;
      document.getElementById('quizReading').style.visibility = 'hidden';
    } else {
      document.getElementById('quizWord').textContent = w.reading;
      document.getElementById('quizReading').style.visibility = 'hidden';
    }
    let options = [w.meaning];
    // 用混淆选项
    const confuse = CONFUSING_OPTIONS[w.meaning];
    if (confuse) {
      options = options.concat(confuse.sort(() => Math.random()-0.5).slice(0,3));
    } else {
      const allW = VOCABULARY[state.currentChapter].words;
      while (options.length < 4) {
        const r = allW[Math.floor(Math.random()*allW.length)].meaning;
        if (!options.includes(r)) options.push(r);
      }
    }
    options = options.slice(0,4).sort(() => Math.random()-0.5);
    window._quizCorrect = w.meaning;
    document.getElementById('quizOptions').innerHTML = options.map((o,i) =>
      `<div class="quiz-option" onclick="handleQuizClick(this)">${o}</div>`
    ).join('');
  } else {
    document.getElementById('quizWord').textContent = w.meaning;
    document.getElementById('quizReading').textContent = '选择对应的日语';
    document.getElementById('quizReading').style.visibility = 'visible';
    const allW = VOCABULARY[state.currentChapter].words;
    let options = [`${w.word}（${w.reading}）`];
    while (options.length < 4) {
      const r = allW[Math.floor(Math.random()*allW.length)];
      const opt = `${r.word}（${r.reading}）`;
      if (!options.includes(opt)) options.push(opt);
    }
    options.sort(() => Math.random()-0.5);
    const correct = `${w.word}（${w.reading}）`;
    window._quizCorrect = correct;
    document.getElementById('quizOptions').innerHTML = options.map((o,i) =>
      `<div class="quiz-option" onclick="handleQuizClick(this)">${o}</div>`
    ).join('');
  }
  document.getElementById('quizCounter').textContent = `${quizIdx+1} / ${quizWords.length}`;
  document.getElementById('quizScore').textContent = `✓ ${quizScore}`;
    speak(quizWords[quizIdx].reading);
  document.getElementById('quizProgress').style.width = (quizIdx/quizWords.length*100)+'%';
  // No auto-speak, user clicks 🔊 if needed
}
function handleQuizClick(el) {
  const selected = el.textContent;
  const correct = window._quizCorrect;
  document.querySelectorAll('#quizOptions .quiz-option').forEach(o => o.style.pointerEvents='none');
  if (selected === correct) {
    el.classList.add('correct'); quizScore++;
    const qw = quizWords[quizIdx];
    const qkey = state.currentChapter+'-'+VOCABULARY[state.currentChapter].words.indexOf(qw);
    updateSM2(qkey, true);
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('#quizOptions .quiz-option').forEach(o => { if (o.textContent===correct) o.classList.add('correct'); });
    const w = quizWords[quizIdx];
    const wkey = state.currentChapter+'-'+VOCABULARY[state.currentChapter].words.indexOf(w);
    updateSM2(wkey, false);
    const existQ = state.errors.find(e=>e.word===w.word);
    if (existQ) { existQ.count=(existQ.count||1)+1; existQ.wrongAt=Date.now(); }
    else state.errors.push({word:w.word,reading:w.reading,meaning:w.meaning,wrongAt:Date.now(),type:'quiz',count:1});
  }
  document.getElementById('quizScore').textContent = `✓ ${quizScore}`;
    speak(quizWords[quizIdx].reading);
  setTimeout(() => { quizIdx++; showQuizQuestion(); saveState(); }, 1500);
}
function speakQuizWord() { if(quizWords[quizIdx]) speak(quizWords[quizIdx].reading); }

  // IME composition tracking

    else state.errors.push({word:w.word,reading:w.reading,meaning:w.meaning,wrongAt:Date.now(),type:'spell',count:1});

function toggleRecording() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('请使用Chrome浏览器以支持语音识别'); return;
  }
  const btn = document.getElementById('recordBtn');
  if (!isRecording) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'ja-JP'; recognition.continuous = false; recognition.interimResults = false;
    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      const confidence = Math.round(e.results[0][0].confidence * 100);
      document.getElementById('recognizedText').textContent = '你说的：' + transcript;
      const w = VOCABULARY[state.currentChapter].words[shadowIdx];
      const expected = shadowMode==='word' ? w.reading : w.example.replace(/（[^）]*）/g,'').replace(/[。、！？]/g,'');
      const similarity = calcSim(transcript.replace(/[。、！？\s]/g,''), expected.replace(/[。、！？\s]/g,''));
      const score = Math.round((similarity * 0.6 + confidence * 0.4));
      
      const resultEl = document.getElementById('shadowResult');
      const detailEl = document.getElementById('shadowDetail');
      resultEl.classList.remove('hidden','score-good','score-ok','score-bad');
      detailEl.classList.remove('hidden');
      
      if (score >= 80) { resultEl.textContent = `🎉 优秀！${score}分`; resultEl.classList.add('score-good'); }
      else if (score >= 55) { resultEl.textContent = `👍 不错 ${score}分`; resultEl.classList.add('score-ok'); }
      else { resultEl.textContent = `💪 再试试 ${score}分`; resultEl.classList.add('score-bad'); }
      detailEl.innerHTML = `发音准确度：${confidence}%<br>内容匹配度：${similarity}%`;
    };
    recognition.onend = () => { btn.classList.remove('recording'); btn.textContent='🎤'; isRecording=false; };
    // Clear previous results
    document.getElementById('shadowResult').classList.add('hidden');
    document.getElementById('shadowDetail').classList.add('hidden');
    document.getElementById('recognizedText').textContent = '';
    recognition.start(); btn.classList.add('recording'); btn.textContent='⏹'; isRecording=true;
  } else {
    recognition.stop(); btn.classList.remove('recording'); btn.textContent='🎤'; isRecording=false;
  }
}
function calcSim(a, b) {
  if (!a || !b) return 0;
  let m = 0;
  const shorter = a.length < b.length ? a : b;
  const longer = a.length >= b.length ? a : b;
  for (let i=0; i<shorter.length; i++) { if (longer.includes(shorter[i])) m++; }
  return Math.round(m / longer.length * 100);
}

// ============ SM-2 间隔重复算法 ============
function sm2(item, quality) {
  // quality: 0-5 (0-2=fail, 3=hard, 4=good, 5=easy)
  if (!item.easeFactor) item.easeFactor = 2.5;
  if (!item.interval) item.interval = 0;
  if (!item.repetitions) item.repetitions = 0;
  
  if (quality >= 3) {
    if (item.repetitions === 0) item.interval = 1;
    else if (item.repetitions === 1) item.interval = 6;
    else item.interval = Math.round(item.interval * item.easeFactor);
    item.repetitions++;
  } else {
    item.repetitions = 0;
    item.interval = 1; // Reset
  }
  item.easeFactor = Math.max(1.3, item.easeFactor + (0.1 - (5-quality)*(0.08+(5-quality)*0.02)));
  item.nextReview = Date.now() + item.interval * 24*60*60*1000;
  return item;
}

// Update markWord to use SM-2
function updateSM2(wordKey, correct) {
  if (!state.wordStatus[wordKey]) state.wordStatus[wordKey] = {};
  const item = state.wordStatus[wordKey];
  item.learnedAt = item.learnedAt || Date.now();
  sm2(item, correct ? 4 : 1);
  saveState();
}

// Override getReviewWords to use SM-2 intervals
function getReviewWords() {
  const now = Date.now(); const results = [];
  for (const [key, info] of Object.entries(state.wordStatus)) {
    if (info.nextReview && info.nextReview <= now) {
      const parts = key.match(/^(.+)-(\d+)$/);
      if (parts && VOCABULARY[parts[1]]) {
        const w = VOCABULARY[parts[1]].words[parseInt(parts[2])];
        if (w) results.push({...w, key, interval: info.interval||0, ef: info.easeFactor||2.5});
      }
    }
  }
  return results.sort((a,b) => a.interval - b.interval); // Weakest first
}

var clozeWords=[], clozeIdx=0, clozeScoreVal=0, clozeRevealed=false, clozeComposing=false;
function startCloze() {
  const words = [...VOCABULARY[state.currentChapter].words];
  clozeWords = words.sort(()=>Math.random()-0.5);
  clozeIdx=0; clozeScoreVal=0;
  showClozeQ();
  const input = document.getElementById('clozeInput');
  input.addEventListener('compositionstart', () => { clozeComposing=true; });
  input.addEventListener('compositionend', () => { clozeComposing=false; });
}
function showClozeQ() {
  // Skip words whose example can't be made into a cloze
  while (clozeIdx < clozeWords.length) {
    var tw = clozeWords[clozeIdx];
    var ts = tw.example;
    var tStripped = ts.replace(/（[^）]*）/g, '');
    if (tStripped.includes(tw.word) || tStripped.includes(tw.reading)) break;
    clozeIdx++;
  }
  if (clozeIdx >= clozeWords.length) {
    document.getElementById('clozeSentence').innerHTML = '<h3>完成！' + clozeScoreVal + '/' + clozeWords.length + '</h3><button class="btn btn-primary" onclick="startCloze()">再来</button>';
    document.getElementById('clozeInput').style.display='none';
    return;
  }
  const w = clozeWords[clozeIdx];
  // Create cloze sentence: replace the word with uniform ＿＿＿＿
  let sentence = w.example;
  const blankHtml = '<span style="color:#e63946;font-weight:bold;border-bottom:2px dashed #e63946;padding:0 8px">＿＿＿＿</span>';
  let replaced = false;
  // Strategy 1: match word with furigana pattern 漢字（かな）
  const furiganaPattern = w.word + '（' + w.reading + '）';
  if (sentence.includes(furiganaPattern)) {
    sentence = sentence.replace(furiganaPattern, blankHtml);
    replaced = true;
  }
  // Strategy 2: match reading with furigana pattern
  if (!replaced) {
    const readingFurigana = w.reading + '（' + w.reading + '）';
    if (sentence.includes(readingFurigana)) {
      sentence = sentence.replace(readingFurigana, blankHtml);
      replaced = true;
    }
  }
  // Strategy 3: match word directly
  if (!replaced && sentence.includes(w.word)) {
    sentence = sentence.replace(w.word, blankHtml);
    replaced = true;
  }
  // Strategy 4: match reading directly
  if (!replaced && sentence.includes(w.reading)) {
    sentence = sentence.replace(w.reading, blankHtml);
    replaced = true;
  }
  // Strategy 5: strip furigana then try matching word or reading with optional furigana
  if (!replaced) {
    var stripped = sentence.replace(/（[^）]*）/g, '');
    var matchTarget = stripped.includes(w.word) ? w.word : (stripped.includes(w.reading) ? w.reading : null);
    if (matchTarget) {
      var escaped = matchTarget.split('').map(function(c) { return c.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?:（[^）]*）)?'; }).join('');
      try { sentence = sentence.replace(new RegExp(escaped), blankHtml); replaced = true; } catch(e) {}
    }
  }
  // Strategy 6: last resort fallback
  if (!replaced) {
    sentence = sentence.replace(/^[^、。]*/, blankHtml);
  }
  document.getElementById('clozeSentence').innerHTML = sentence + '<div style="font-size:13px;color:#888;margin-top:8px">' + w.exampleCn + '</div>';
  document.getElementById('clozeHintArea').textContent = '';
  document.getElementById('clozeInput').value = '';
  document.getElementById('clozeInput').style.display = '';
  document.getElementById('clozeResult').textContent = '';
  document.getElementById('clozeCounter').textContent = (clozeIdx+1) + ' / ' + clozeWords.length;
  document.getElementById('clozeScore').textContent = '✓ ' + clozeScoreVal;
  document.getElementById('clozeProgress').style.width = (clozeIdx/clozeWords.length*100)+'%';
  clozeRevealed = false;
}
function handleClozeKey(e) {
  if (e.key==='Enter' && !clozeComposing) checkCloze();
}
function checkCloze() {
  if (clozeRevealed) { nextCloze(); return; }
  const w = clozeWords[clozeIdx];
  const input = document.getElementById('clozeInput').value.trim();
  if (!input) return;
  const correct = (input === w.word || input === w.reading);
  const resultEl = document.getElementById('clozeResult');
  if (correct) {
    resultEl.innerHTML = '<span style="color:#2ec4b6">✅ 正解！<strong>' + w.word + '（' + w.reading + '）</strong></span>';
    clozeScoreVal++;
  } else {
    resultEl.innerHTML = '<span style="color:#e63946">❌ 正解：<strong>' + w.word + '（' + w.reading + '）</strong> = ' + w.meaning + '</span>';
    const existingC = state.errors.find(e=>e.word===w.word);
    if (existingC) { existingC.count=(existingC.count||1)+1; }
    else state.errors.push({word:w.word,reading:w.reading,meaning:w.meaning,wrongAt:Date.now(),type:'cloze',count:1});
  }
  // Update SM-2
  const chKey = state.currentChapter + '-' + VOCABULARY[state.currentChapter].words.indexOf(w);
  updateSM2(chKey, correct);
  document.getElementById('clozeScore').textContent = '✓ ' + clozeScoreVal;
  clozeRevealed = true;
  saveState();
}
function clozeMeaning() {
  const w = clozeWords[clozeIdx];
  document.getElementById('clozeHintArea').textContent = '意思：' + w.meaning + ' | 搭配：' + w.collocation;
}
function clozeReveal() {
  const w = clozeWords[clozeIdx];
  document.getElementById('clozeResult').innerHTML = '<span style="color:#856404">👁 答案：<strong>' + w.word + '（' + w.reading + '）</strong></span>';
  clozeRevealed = true;
  // Count as fail for SM-2
  const chKey = state.currentChapter + '-' + VOCABULARY[state.currentChapter].words.indexOf(w);
  updateSM2(chKey, false);
}

function prevCloze() { if(clozeIdx>0){clozeIdx--; showClozeQ();} }

// ============ 模式切换 ============
function switchMode(mode) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => { if(t.getAttribute('onclick').includes(mode)) t.classList.add('active'); });
  ['learn','quiz','spell','shadow','jlpt','cloze','review','errors'].forEach(m => document.getElementById('mode-'+m).classList.add('hidden'));
  document.getElementById('mode-'+mode).classList.remove('hidden');
  if (mode==='learn') {
    // Skip to first unlearned word
    if (!skipToUnlearned()) {
      document.getElementById('learnWord').textContent = '🎉';
      document.getElementById('learnReading').textContent = '本課已学完！';
      document.getElementById('learnMeaning').textContent = '全部单词已学习完毕';
      document.getElementById('learnCollocation').textContent = '';
      document.getElementById('learnExample').innerHTML = '<div style="text-align:center"><button class="btn btn-primary" onclick="restartLearn();updateLearnView()">🔄 从头复习</button></div>';
    } else {
      updateLearnView();
    }
  }
  if (mode==='quiz') startQuiz();
  if (mode==='spell') startSpell();
  if (mode==='shadow') { shadowIdx=0; updateShadowView(); }
  if (mode==='jlpt') startJlpt();
  if (mode==='cloze') startCloze();
  if (mode==='review') updateReviewList();
  if (mode==='errors') updateErrorList();
}

// ============ 初始化 ============
// quickExport for sync button
function quickExport() {
  const keys = Object.keys(localStorage);
  const data = {};
  keys.forEach(k => { try { data[k] = JSON.parse(localStorage.getItem(k)); } catch(e) { data[k] = localStorage.getItem(k); } });
  const json = JSON.stringify(data);
  try { navigator.clipboard.writeText(json).then(() => alert('✅ 已复制！在其他设备首页粘贴导入')); }
  catch(e) { prompt('请手动复制以下数据：', json); }
}

window.onload = function() {
  document.getElementById('chapterSelect').value = state.currentChapter;
  // Skip to first unlearned word
  if (!skipToUnlearned()) {
    // All learned, stay at current
  }
  updateLearnView(); updateStats();
  if ('speechSynthesis' in window) speechSynthesis.getVoices();
};

// ============ 跨设备同步 ============
function exportData() {
  const keys = Object.keys(localStorage);
  const data = {};
  keys.forEach(k => { try { data[k] = JSON.parse(localStorage.getItem(k)); } catch(e) { data[k] = localStorage.getItem(k); } });
  const json = JSON.stringify(data);
  const ta = document.getElementById('syncData');
  ta.value = json;
  ta.select();
  try { navigator.clipboard.writeText(json); showSyncMsg('✅ 已复制到剪贴板！粘贴到另一台设备导入即可'); } 
  catch(e) { showSyncMsg('⬆️ 请手动全选复制上面的文本'); }
}
function importData() {
  const raw = document.getElementById('syncData').value.trim();
  if (!raw) { showSyncMsg('❌ 请先粘贴数据'); return; }
  try {
    const data = JSON.parse(raw);
    let count = 0;
    for (const [k, v] of Object.entries(data)) {
      localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v));
      count++;
    }
    showSyncMsg('✅ 导入成功！共 ' + count + ' 条数据，刷新页面生效');
    setTimeout(() => location.reload(), 1500);
  } catch(e) { showSyncMsg('❌ 数据格式错误，请检查'); }
}
function showSyncMsg(msg) {
  const el = document.getElementById('syncMsg');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}
