  totalAnswered: 0, totalCorrect: 0, streak: 0

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// TTS
let synth = window.speechSynthesis;
let currentUtterance = null;
let playCount = 0;
let maxPlays = 2;
let currentRate = 1.0;

function speak(text, rate, onEnd) {
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = rate || currentRate;
  u.pitch = 1.0;
  // Try to find a Japanese voice
  const voices = synth.getVoices();
  const jaVoice = voices.find(v => v.lang.startsWith('ja'));
  if (jaVoice) u.voice = jaVoice;
  if (onEnd) u.onend = onEnd;
  currentUtterance = u;
  synth.speak(u);
}

function stopSpeech() { synth.cancel(); }

let currentMode = 'keyword';
let currentQ = 0;
let answered = {};

function switchMode(mode) {
  currentMode = mode;
  currentQ = 0;
  answered = {};
  playCount = 0;
  stopSpeech();
  document.querySelectorAll('.tab').forEach((t,i) => {
    const modes = ['keyword','turn','point','response','speed'];
    t.classList.toggle('active', modes[i] === mode);
  });
  render();
}

function updateStats() {
  document.getElementById('statTotal').textContent = state.totalAnswered;
  document.getElementById('statCorrect').textContent = state.totalCorrect;
  document.getElementById('statAcc').textContent = state.totalAnswered ? Math.round(state.totalCorrect/state.totalAnswered*100)+'%' : '0%';
  document.getElementById('statStreak').textContent = state.streak;
}

function getList() { return listeningData[currentMode] || []; }

function render() {
  updateStats();
  const el = document.getElementById('content');
  const list = getList();
  if (currentQ >= list.length) {
    el.innerHTML = '<div class="card"><div class="result-banner good"><h2>🎉 全部完了！</h2><p>正解率: '+( state.totalAnswered ? Math.round(state.totalCorrect/state.totalAnswered*100) : 0)+'%</p></div><div class="btn-group"><button class="btn btn-primary" onclick="currentQ=0;render()">最初から</button></div></div>';
    return;
  }
  playCount = 0;
  answered = {};
  const item = list[currentQ];
  const isSpeed = currentMode === 'speed';
  el.innerHTML = `
    <div class="card">
      <div class="counter">${currentQ+1} / ${list.length} <span class="scene-tag">${item.scene}</span></div>
      <div class="progress-bar"><div class="fill" style="width:${(currentQ/list.length)*100}%"></div></div>
      <div class="player-controls">
        <button class="play-btn" id="playBtn" onclick="playAudio()">▶</button>
      </div>
      <div class="speed-control">
        ${[0.8,1.0,1.2,1.5].map(s => `<button class="speed-btn ${s===currentRate?'active':''}" onclick="setSpeed(${s})">${s}x</button>`).join('')}
      </div>
      <div class="listen-count" id="listenCount">再生回数: 0/2</div>
      ${isSpeed ? '<p style="font-size:13px;color:#666;text-align:center;">まず1.2xで聴いてから、原速で確認しましょう</p>' : ''}
      ${currentMode === 'turn' ? `<p style="margin:8px 0;font-size:14px;">転折語: <strong style="color:#e63946;">${item.turnWord}</strong></p>` : ''}
      <div id="questionArea" class="hidden"></div>
      <div id="resultArea" class="hidden"></div>
    </div>`;
}

function setSpeed(s) {
  currentRate = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', parseFloat(b.textContent) === s));
}

function playAudio() {
  const list = getList();
  const item = list[currentQ];
  if (playCount >= maxPlays) return;
  playCount++;
  document.getElementById('listenCount').textContent = `再生回数: ${playCount}/${maxPlays}`;
  const btn = document.getElementById('playBtn');
  btn.disabled = true;
  btn.textContent = '⏸';

  const rate = (currentMode === 'speed' && playCount === 1) ? 1.2 : currentRate;
  speak(item.text, rate, () => {
    btn.disabled = playCount >= maxPlays;
    btn.textContent = playCount >= maxPlays ? '✗' : '▶';
    // Show questions after first play
    if (playCount >= 1) {
      document.getElementById('questionArea').classList.remove('hidden');
      renderItemQuestions(item);
    }
  });
}

function renderItemQuestions(item) {
  const qEl = document.getElementById('questionArea');
  if (qEl.innerHTML) return; // already rendered
  qEl.innerHTML = item.questions.map((q,qi) => `
    <div style="margin-top:12px;">
      <p style="font-size:14px;font-weight:bold;line-height:1.6;">${q.q}</p>
      <div class="quiz-options" id="lqOpts${qi}">
        ${q.options.map((o,oi) => `<div class="quiz-option" onclick="answerListening(${qi},${oi})">${o}</div>`).join('')}
      </div>
    </div>
  `).join('');
}

function answerListening(qi, oi) {
  if (answered[qi] !== undefined) return;
  const list = getList();
  const item = list[currentQ];
  const q = item.questions[qi];
  answered[qi] = oi;
  const opts = document.querySelectorAll(`#lqOpts${qi} .quiz-option`);
  opts.forEach(o => o.classList.add('disabled'));
  opts[q.answer].classList.add('correct');
  const correct = oi === q.answer;
  if (!correct) opts[oi].classList.add('wrong');
  state.totalAnswered++;
  if (correct) { state.totalCorrect++; state.streak++; } else { state.streak = 0; }
  saveState();
  updateStats();
  // All questions answered?
  if (Object.keys(answered).length === item.questions.length) {
    const resEl = document.getElementById('resultArea');
    resEl.classList.remove('hidden');
    const allCorrect = item.questions.every((q,i) => answered[i] === q.answer);
    let extra = '';
    if (currentMode === 'turn') extra = `<p style="margin-top:8px;font-size:14px;">ポイント: ${item.keyPoint}</p>`;
    resEl.innerHTML = `
      <div class="result-banner ${allCorrect?'good':'bad'}">${allCorrect?'✅ 正解！':'❌ 惜しい！'}</div>
      <div class="transcript"><strong>原文：</strong><br>${item.text}</div>
      ${extra}
      <div class="btn-group"><button class="btn btn-primary" onclick="currentQ++;render()">次へ →</button></div>`;
  }
}

// Init voices
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = () => {};
render();

// ============ 跨设备同步 ============
function exportData() {
  const keys = Object.keys(localStorage);
  const data = {};
  keys.forEach(k => { try { data[k] = JSON.parse(localStorage.getItem(k)); } catch(e) { data[k] = localStorage.getItem(k); } });
  const json = JSON.stringify(data);
  const ta = document.getElementById('syncData');
  ta.value = json;
  ta.select();
  try { navigator.clipboard.writeText(json); showSyncMsg('✅ 已复制到剪贴板！粘贴到另一台设备导入即可'); } 
  catch(e) { showSyncMsg('⬆️ 请手动全选复制上面的文本'); }
}
function importData() {
  const raw = document.getElementById('syncData').value.trim();
  if (!raw) { showSyncMsg('❌ 请先粘贴数据'); return; }
  try {
    const data = JSON.parse(raw);
    let count = 0;
    for (const [k, v] of Object.entries(data)) {
      localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v));
      count++;
    }
    showSyncMsg('✅ 导入成功！共 ' + count + ' 条数据，刷新页面生效');
    setTimeout(() => location.reload(), 1500);
  } catch(e) { showSyncMsg('❌ 数据格式错误，请检查'); }
}
function showSyncMsg(msg) {
  const el = document.getElementById('syncMsg');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}
</script>
</body>
