<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>N3文法復習</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#f0f4ff;color:#1a1a2e;min-height:100vh}
.header{background:linear-gradient(135deg,#4361ee,#3a0ca3);color:#fff;padding:16px 20px;text-align:center;position:sticky;top:0;z-index:100}
.header h1{font-size:1.3rem}
.header p{font-size:.8rem;opacity:.85}
.container{max-width:600px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.card h2{color:#4361ee;font-size:1.1rem;margin-bottom:12px}
.btn{display:inline-block;padding:10px 20px;border:none;border-radius:12px;font-size:.95rem;font-weight:600;cursor:pointer;transition:.2s;text-align:center}
.btn-primary{background:#4361ee;color:#fff}
.btn-primary:hover{background:#3a0ca3}
.btn-block{display:block;width:100%}
.btn-secondary{background:#e8ecff;color:#4361ee}
.option-btn{display:block;width:100%;padding:14px 16px;margin:8px 0;border:2px solid #e0e0e0;border-radius:12px;background:#fff;font-size:.95rem;text-align:left;cursor:pointer;transition:.2s;line-height:1.5}
.option-btn:hover{border-color:#4361ee;background:#f8f9ff}
.option-btn.correct{border-color:#06d6a0;background:#d4edda}
.option-btn.wrong{border-color:#ef476f;background:#fde8ec}
.option-btn.show-correct{border-color:#06d6a0;background:#d4edda}
.result-correct{background:#d4edda;border:2px solid #06d6a0;border-radius:12px;padding:16px;margin:12px 0}
.result-wrong{background:#fde8ec;border:2px solid #ef476f;border-radius:12px;padding:16px;margin:12px 0}
.explanation{background:#f0f4ff;border-left:4px solid #4361ee;padding:12px 16px;margin:12px 0;border-radius:0 12px 12px 0;font-size:.88rem;line-height:1.7}
.explanation strong{color:#4361ee}
.progress-bar{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#4361ee,#06d6a0);border-radius:3px;transition:width .3s}
.stats-bar{display:flex;justify-content:space-around;padding:12px;background:#f8f9ff;border-radius:12px;margin-bottom:12px}
.stats-bar .stat{text-align:center}
.stats-bar .stat-num{font-size:1.2rem;font-weight:700;color:#4361ee}
.stats-bar .stat-label{font-size:.7rem;color:#888}
.quiz-sentence{font-size:1.1rem;line-height:1.8;margin:12px 0;padding:14px;background:#f8f9ff;border-radius:12px}
.blank{display:inline-block;min-width:80px;border-bottom:2px solid #4361ee;text-align:center;color:#4361ee;font-weight:700}
.tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.75rem;font-weight:600;margin:4px 2px}
.tag-fill{background:#e8ecff;color:#4361ee}
.tag-judge{background:#fff3cd;color:#856404}
.tag-compare{background:#d4edda;color:#155724}
.tag-order{background:#ffe0e6;color:#c9184a}
.nav-types{display:flex;gap:6px;padding:12px 0;overflow-x:auto;flex-wrap:wrap}
.nav-types button{flex-shrink:0;padding:6px 12px;border:2px solid #4361ee;border-radius:20px;background:#fff;color:#4361ee;font-size:.78rem;font-weight:600;cursor:pointer}
.nav-types button.active{background:#4361ee;color:#fff}
ruby{ruby-position:over}rt{font-size:.6em;color:#888}
.order-word{display:inline-block;padding:8px 14px;margin:4px;border:2px solid #4361ee;border-radius:10px;background:#fff;font-size:.95rem;cursor:pointer;transition:.2s;user-select:none}
.order-word.selected{background:#4361ee;color:#fff}
.order-area{min-height:50px;padding:8px;border:2px dashed #ccc;border-radius:12px;margin:8px 0}
.hidden{display:none!important}
.day-selector{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.day-chip{padding:8px 14px;border-radius:12px;font-size:.82rem;font-weight:600;cursor:pointer;text-align:center;min-width:60px;border:2px solid #4361ee;background:#fff;color:#4361ee;transition:.2s}
.day-chip.active{background:#4361ee;color:#fff}
.day-chip:hover{background:#e8ecff}
.day-chip.active:hover{background:#3a0ca3}
.grammar-card{background:#f8f9ff;border-radius:10px;padding:10px 12px;margin:6px 0;border-left:3px solid #4361ee;font-size:.85rem;line-height:1.6}
.grammar-card strong{color:#4361ee}
.grammar-card .structure{color:#888;font-size:.78rem}
</style>
</head>
<body>
<div class="header">
<h1>📝 N3 <ruby>文法復習<rt>ぶんぽうふくしゅう</rt></ruby></h1>
<p>7日間で50の<ruby>核心文法<rt>かくしんぶんぽう</rt></ruby>をマスター</p>
</div>
<div class="container" id="app"></div>

<script>
/* ===== DAILY_DATA: 7天分组 ===== */
var DAILY_DATA = {
"Day1": {
  title: "目的・決定の文法",
  grammar: [
    {name:"ようにする",meaning:"努力去做…（心里想着要做到）",keyPoint:"重点：表示'尽量做到'的努力感。前面接的动词是你控制不了的（无意志）或否定形。比如'尽量不迟到'、'让日语变好'",structure:"动词辞书形/ない形＋ようにする"},
    {name:"ことにする",meaning:"自己决定做…（拍板了！）",keyPoint:"重点：是你自己做的决定。'我决定每天跑步'→ことにした。如果是别人/公司决定的→ことになった",structure:"动词辞书形/ない形＋ことにする"},
    {name:"ために",meaning:"为了…（目的明确）",keyPoint:"重点：前面必须是'能自己控制的动作'。'为了考上大学'→ために✅ '为了变聪明'→ように✅（变聪明不是你能直接控制的）",structure:"动词辞书形＋ために / 名词の＋ために"}
  ],
  questions: [
    {type:'fill',grammar:'ようにする',sentence:'<ruby>毎日<rt>まいにち</rt></ruby><ruby>野菜<rt>やさい</rt></ruby>を<ruby>食<rt>た</rt></ruby>べる＿＿＿＿している。',options:['ようにする','ことにする','ために','ように'],answer:3,explain:'【考点】ようにしている＝習慣的に努力していること。「ように」は無意志動詞や状態の変化に使う。「ために」は意志的な目的。ここは習慣なので「ように」。'},
    {type:'compare',grammar:'ようにする',sentenceA:'毎日運動する<strong>ようにしている</strong>。',sentenceB:'毎日運動する<strong>ことにしている</strong>。',question:'どちらが「努力して習慣にしている」の意味？',answer:0,explain:'【考点】「ようにする」は努力・心がけ。「ことにする」は決定。「ようにしている」は「がんばって～している」、「ことにしている」は「～すると決めている」。'},
    {type:'judge',grammar:'ようにする',sentence:'日本語が上手になるようにした。',correct:true,explain:'【考点】「ようにする」は努力を表す。「上手になる」は無意志動詞なので「ように」が正しい。'},
    {type:'fill',grammar:'ようにする',sentence:'<ruby>遅刻<rt>ちこく</rt></ruby>しない＿＿＿＿してください。',options:['ように','ことに','ために','のに'],answer:0,explain:'【考点】ない形＋ようにする＝～しないように努力する。遅刻しないように気をつける。'},
    {type:'order',grammar:'ようにする',words:['毎日','野菜を','食べる','ように','している'],correct:'毎日 野菜を 食べる ように している',explain:'【考点】ようにしている＝努力して習慣にしている。語順：副詞→目的語→動詞辞書形→ように→している。'},
    {type:'fill',grammar:'ことにする',sentence:'<ruby>来月<rt>らいげつ</rt></ruby>から<ruby>毎朝<rt>まいあさ</rt></ruby><ruby>走<rt>はし</rt></ruby>る＿＿＿＿した。',options:['ことに','ように','ために','わけに'],answer:0,explain:'【考点】ことにする＝自分で決定する。「走る」は意志動詞。自分で決めたのだから「ことにした」。'},
    {type:'compare',grammar:'ことにする',sentenceA:'来年留学する<strong>ことにした</strong>。',sentenceB:'来年留学する<strong>ことになった</strong>。',question:'どちらが「自分で決めた」の意味？',answer:0,explain:'【考点】「ことにした」は自分の意志で決定。「ことになった」は外的な決定（会社や状況が決めた）。'},
    {type:'judge',grammar:'ことにする',sentence:'雨が降ることにした。',correct:false,explain:'【考点】「ことにする」は意志的決定。天気は自分で決められないので不自然。「雨が降ることになった」なら可能。'},
    {type:'fill',grammar:'ために',sentence:'<ruby>大学<rt>だいがく</rt></ruby>に<ruby>入<rt>はい</rt></ruby>る＿＿＿＿、<ruby>毎日<rt>まいにち</rt></ruby><ruby>勉強<rt>べんきょう</rt></ruby>している。',options:['ために','ように','ことに','わけに'],answer:0,explain:'【考点】ために＝目的を表す。「入る」は意志動詞なので「ために」が正しい。「ように」は無意志動詞に使う。'},
    {type:'compare',grammar:'ために',sentenceA:'日本語が話せる<strong>ように</strong>、毎日練習する。',sentenceB:'日本語を話す<strong>ために</strong>、毎日練習する。',question:'「ために」の前は何形？',answer:1,explain:'【考点】「ために」の前は辞書形（意志動詞）。「ように」の前は可能形や無意志動詞。「話せる」は可能形→ように、「話す」は辞書形→ために。'},
    {type:'judge',grammar:'ために',sentence:'日本語が上手になるために、毎日勉強する。',correct:false,explain:'【考点】「上手になる」は無意志動詞（自然な変化）。無意志動詞には「ように」を使う。「上手になるように」が正しい。'},
    {type:'order',grammar:'ために',words:['大学に','入る','ために','毎日','勉強している'],correct:'大学に 入る ために 毎日 勉強している',explain:'【考点】ために＝目的。語順：目的＋ために＋手段。'}
  ]
},
"Day2": {
  title: "完了・経験・程度",
  grammar: [
    {name:"てしまう",meaning:"做完了 / 不小心做了…（后悔😣）",keyPoint:"两个意思：①全部做完了（吃完了）②后悔、遗憾（不小心弄丢了）。口语说'ちゃう/じゃう'",structure:"动词て形＋しまう"},
    {name:"ことがある",meaning:"曾经…过 / 有时候会…",keyPoint:"た形＋ことがある＝过去的经验（去过日本吗？）。辞书形＋ことがある＝偶尔发生（有时会迟到）。注意接续不同意思完全不同！",structure:"动词た形/辞书形＋ことがある"},
    {name:"ばかり",meaning:"刚刚… / 净是…（不满😤）",keyPoint:"た＋ばかり＝刚做完（刚来日本）。名词＋ばかり＝总是只做这个（他整天就知道打游戏！→不满语气）",structure:"た形＋ばかり / 名词＋ばかり"},
    {name:"ほど",meaning:"…到某种程度",keyPoint:"'哭的程度的感动'→泣くほど感動した＝感动得都哭了。用来夸张描述程度",structure:"动词辞书形＋ほど / 名词＋ほど"}
  ],
  questions: [
    {type:'fill',grammar:'てしまう',sentence:'<ruby>大切<rt>たいせつ</rt></ruby>な<ruby>本<rt>ほん</rt></ruby>を<ruby>無<rt>な</rt></ruby>くして＿＿＿＿。',options:['しまった','おいた','みた','あった'],answer:0,explain:'【考点】てしまう＝完了または残念な気持ち。大切なものをなくした→後悔・残念→「てしまった」。'},
    {type:'judge',grammar:'てしまう',sentence:'ケーキを全部食べてしまった。',correct:true,explain:'【考点】「てしまう」は①完了（全部食べた）②残念・後悔の気持ち。両方の意味で使える自然な文。'},
    {type:'fill',grammar:'てしまう',sentence:'つい<ruby>嘘<rt>うそ</rt></ruby>を＿＿＿＿しまった。',options:['ついて','つけて','ついた','つき'],answer:0,explain:'【考点】「嘘をつく」→て形「嘘をついて」＋しまう。「つい」は「うっかり」の意味で、後悔のニュアンスを強める。'},
    {type:'order',grammar:'てしまう',words:['財布を','電車に','忘れて','しまった'],correct:'財布を 電車に 忘れて しまった',explain:'【考点】てしまう＝後悔。「電車に忘れてしまった」は典型的な使い方。'},
    {type:'fill',grammar:'ことがある',sentence:'<ruby>日本<rt>にほん</rt></ruby>に<ruby>行<rt>い</rt></ruby>った＿＿＿＿がある。',options:['こと','もの','ところ','わけ'],answer:0,explain:'【考点】たことがある＝経験を表す。「行った」（た形）＋ことがある＝行った経験がある。'},
    {type:'judge',grammar:'ことがある',sentence:'明日、雨が降ることがある。',correct:false,explain:'【考点】「たことがある」は過去の経験。未来のことには使えない。「明日雨が降るかもしれない」が正しい。ただし「辞書形＋ことがある」は「時々～する」の意味で使える。'},
    {type:'compare',grammar:'ことがある',sentenceA:'寿司を<strong>食べたことがある</strong>。',sentenceB:'寿司を<strong>食べることがある</strong>。',question:'どちらが「経験」の意味？',answer:0,explain:'【考点】「た形＋ことがある」＝経験（過去に一度でもしたことがある）。「辞書形＋ことがある」＝時々起こる。'},
    {type:'fill',grammar:'ばかり',sentence:'<ruby>日本<rt>にほん</rt></ruby>に<ruby>来<rt>き</rt></ruby>た＿＿＿＿で、まだ<ruby>何<rt>なに</rt></ruby>も<ruby>分<rt>わ</rt></ruby>からない。',options:['ばかり','だけ','しか','ほど'],answer:0,explain:'【考点】たばかり＝～したばかり（直後）。来たばかり＝最近来たところ。'},
    {type:'judge',grammar:'ばかり',sentence:'彼はゲームばかりしている。',correct:true,explain:'【考点】名詞/て形＋ばかり＝～ばかり（それだけ繰り返し）。「ゲームばかり」＝ゲームしかしない（不満のニュアンス）。'},
    {type:'fill',grammar:'ばかり',sentence:'<ruby>甘<rt>あま</rt></ruby>いもの＿＿＿＿<ruby>食<rt>た</rt></ruby>べていると、<ruby>太<rt>ふと</rt></ruby>るよ。',options:['ばかり','だけ','しか','ほど'],answer:0,explain:'【考点】名詞＋ばかり＝それだけ（不満・批判のニュアンス）。甘いものばかり＝甘いものしか食べない。'},
    {type:'fill',grammar:'ほど',sentence:'この<ruby>映画<rt>えいが</rt></ruby>は<ruby>泣<rt>な</rt></ruby>く＿＿＿＿<ruby>感動<rt>かんどう</rt></ruby>した。',options:['ほど','ぐらい','まで','だけ'],answer:0,explain:'【考点】ほど＝程度。「泣くほど感動した」＝泣くくらい感動的だった。'}
  ]
},
"Day3": {
  title: "推量・判断の文法",
  grammar: [
    {name:"はず",meaning:"应该是…（我有根据的！）",keyPoint:"有理由相信某事。'他8点出发的，现在应该到了'→はず。确信度高，不是瞎猜",structure:"普通形＋はずだ / 名词の＋はずだ"},
    {name:"わけ",meaning:"所以就是…嘛 / 并不是…",keyPoint:"两个用法：①逻辑推导'住了5年所以日语好→わけだ' ②部分否定'并不是他不好→わけではない'",structure:"普通形＋わけだ / わけではない"},
    {name:"つもり",meaning:"我打算…（我自己决定的）",keyPoint:"只能说自己的打算！'我打算去日本'→つもり✅ '雨打算下'→つもり❌（雨没有意志）。说别人的用はず",structure:"动词辞书形/ない形＋つもりだ"},
    {name:"かもしれない",meaning:"也许…吧（不太确定🤔）",keyPoint:"确信度大概50%，就是'可能吧'的感觉。比はず弱很多",structure:"普通形＋かもしれない"},
    {name:"にちがいない",meaning:"肯定是！（我超确定💯）",keyPoint:"确信度90%以上。'这么多人排队，肯定是名店！'有明确理由支撑的强烈判断",structure:"普通形＋にちがいない"}
  ],
  questions: [
    {type:'fill',grammar:'はず',sentence:'<ruby>彼<rt>かれ</rt></ruby>はもう<ruby>着<rt>つ</rt></ruby>いている＿＿＿＿だ。',options:['はず','わけ','つもり','よう'],answer:0,explain:'【考点】はず＝当然そうだと推量する。根拠があって「～のはずだ」。彼が出発した時間から考えて、もう着いているはず。'},
    {type:'compare',grammar:'はず',sentenceA:'彼は来る<strong>はず</strong>だ。',sentenceB:'彼は来る<strong>つもり</strong>だ。',question:'どちらが「話し手の推量」？',answer:0,explain:'【考点】「はず」は話し手が根拠を持って推量。「つもり」は本人の意志・予定。「来るはず」は「来ると思う」、「来るつもり」は「来る予定だ（本人が決めた）」。'},
    {type:'judge',grammar:'はず',sentence:'明日は日曜日のはずだ。',correct:true,explain:'【考点】カレンダーという根拠に基づく推量。「はず」は確信度が高い推量に使う。'},
    {type:'fill',grammar:'わけ',sentence:'<ruby>日本<rt>にほん</rt></ruby>に5<ruby>年<rt>ねん</rt></ruby><ruby>住<rt>す</rt></ruby>んでいるから、<ruby>日本語<rt>にほんご</rt></ruby>が<ruby>上手<rt>じょうず</rt></ruby>な＿＿＿＿だ。',options:['わけ','はず','もの','こと'],answer:0,explain:'【考点】わけだ＝論理的帰結。「5年住んでいる→だから上手」という因果関係。'},
    {type:'fill',grammar:'わけ',sentence:'<ruby>彼<rt>かれ</rt></ruby>が<ruby>悪<rt>わる</rt></ruby>い＿＿＿＿ではない。',options:['わけ','はず','つもり','こと'],answer:0,explain:'【考点】わけではない＝部分否定。「必ずしも彼が悪いとは言えない」という意味。'},
    {type:'judge',grammar:'わけ',sentence:'お金がないわけではないが、節約している。',correct:true,explain:'【考点】わけではない＝必ずしも～ない（部分否定）。お金がないのではなく、あるけど節約している。'},
    {type:'fill',grammar:'つもり',sentence:'<ruby>来年<rt>らいねん</rt></ruby><ruby>日本<rt>にほん</rt></ruby>に<ruby>行<rt>い</rt></ruby>く＿＿＿＿です。',options:['つもり','はず','わけ','よう'],answer:0,explain:'【考点】つもり＝自分の意志・予定。「行くつもり」＝行く予定だ（自分で決めた）。'},
    {type:'judge',grammar:'つもり',sentence:'雨が降るつもりです。',correct:false,explain:'【考点】「つもり」は本人の意志。天気に意志はないので不自然。「雨が降るようです」「雨が降るはずです」が正しい。'},
    {type:'compare',grammar:'つもり',sentenceA:'日本語を<strong>勉強するつもり</strong>です。',sentenceB:'日本語を<strong>勉強するはず</strong>です。',question:'どちらが「自分の予定」？',answer:0,explain:'【考点】「つもり」は自分の計画。「はず」は推量。自分のことは「つもり」、他人のことは「はず」を使うことが多い。'},
    {type:'fill',grammar:'かもしれない',sentence:'<ruby>明日<rt>あした</rt></ruby>は<ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>る＿＿＿＿。',options:['かもしれない','にちがいない','はずだ','わけだ'],answer:0,explain:'【考点】かもしれない＝可能性（50%くらい）。「にちがいない」は確信。「はず」は根拠ある推量。'},
    {type:'fill',grammar:'にちがいない',sentence:'こんなに<ruby>混<rt>こ</rt></ruby>んでいるから、<ruby>人気<rt>にんき</rt></ruby>のある<ruby>店<rt>みせ</rt></ruby>に＿＿＿＿。',options:['ちがいない','かもしれない','はずだ','そうだ'],answer:0,explain:'【考点】にちがいない＝確信を持った推量。混んでいる→きっと人気がある。'}
  ]
},
"Day4": {
  title: "推測四兄弟（ようだ・らしい・みたい・そうだ）",
  grammar: [
    {name:"ようだ",meaning:"好像…（我亲眼看到/感觉到的）",keyPoint:"用自己的五感判断的。看窗外'好像在下雨'→ようだ。比较书面，正式场合用",structure:"普通形＋ようだ / 名词の＋ようだ"},
    {name:"らしい",meaning:"听说…（别人告诉我的）",keyPoint:"信息来源是别人说的、新闻、传闻。'听说田中要结婚了'→らしい。不是自己亲眼看到的",structure:"普通形＋らしい / 名词＋らしい"},

    {type:'fill',grammar:'と',sentence:'<ruby>春<rt>はる</rt></ruby>になる＿＿＿＿、<ruby>桜<rt>さくら</rt></ruby>が<ruby>咲<rt>さ</rt></ruby>く。',options:['と','たら','ば','なら'],answer:0,explain:'【考点】と＝自然な帰結・習慣。春になる→必ず桜が咲く（自然現象）。'},

    {type:'fill',grammar:'ように',sentence:'<ruby>忘<rt>わす</rt></ruby>れない＿＿＿＿、メモした。',options:['ように','ために','のに','ことに'],answer:0,explain:'【考点】ない形＋ように＝～しないために。忘れないための方法としてメモした。「ために」は意志動詞のみ。'},
    {type:'fill',grammar:'のに',sentence:'<ruby>約束<rt>やくそく</rt></ruby>したのに、<ruby>彼<rt>かれ</rt></ruby>は<ruby>来<rt>こ</rt></ruby>なかった。',options:['のに','から','ので','けど'],answer:0,explain:'【考点】のに＝逆接（期待はずれ・不満）。約束した→来るはず→でも来なかった→不満。'},
    {type:'fill',grammar:'ながら',sentence:'<ruby>音楽<rt>おんがく</rt></ruby>を<ruby>聞<rt>き</rt></ruby>き＿＿＿＿<ruby>勉強<rt>べんきょう</rt></ruby>する。',options:['ながら','つつ','たり','ては'],answer:0,explain:'【考点】ます形＋ながら＝同時進行。音楽を聞くことと勉強することを同時にする。'},
    {type:'fill',grammar:'たり～たりする',sentence:'<ruby>休<rt>やす</rt></ruby>みの<ruby>日<rt>ひ</rt></ruby>は<ruby>本<rt>ほん</rt></ruby>を<ruby>読<rt>よ</rt></ruby>んだり<ruby>映画<rt>えいが</rt></ruby>を<ruby>見<rt>み</rt></ruby>たり＿＿＿＿。',options:['する','した','して','しよう'],answer:0,explain:'【考点】たり～たりする＝いくつかの行動を例示。最後は「する」で締める。'},
    {type:'fill',grammar:'ないで',sentence:'<ruby>朝<rt>あさ</rt></ruby>ごはんを<ruby>食<rt>た</rt></ruby>べ＿＿＿＿<ruby>学校<rt>がっこう</rt></ruby>に<ruby>行<rt>い</rt></ruby>った。',options:['ないで','なくて','ずに','ないと'],answer:0,explain:'【考点】ないで＝～しないで（付帯状況）。食べない状態で学校に行った。「なくて」は理由。'},

    {type:'fill',grammar:'なくてもいい',sentence:'<ruby>明日<rt>あした</rt></ruby>は<ruby>休<rt>やす</rt></ruby>みだから、<ruby>早<rt>はや</rt></ruby>く<ruby>起<rt>お</rt></ruby>き＿＿＿＿。',options:['なくてもいい','なければならない','ないといけない','なくてはいけない'],answer:0,explain:'【考点】なくてもいい＝～しなくてもよい（不必要）。休みだから早く起きる必要がない。'},
    {type:'fill',grammar:'ことができる',sentence:'<ruby>彼<rt>かれ</rt></ruby>は3つの<ruby>言語<rt>げんご</rt></ruby>を<ruby>話<rt>はな</rt></ruby>す＿＿＿＿。',options:['ことができる','ようになる','ようにする','ことにする'],answer:0,explain:'【考点】ことができる＝能力・可能性。辞書形＋ことができる。可能形と同じ意味。'},
    {type:'fill',grammar:'ほうがいい',sentence:'<ruby>熱<rt>ねつ</rt></ruby>があるなら、<ruby>病院<rt>びょういん</rt></ruby>に<ruby>行<rt>い</rt></ruby>った＿＿＿＿。',options:['ほうがいい','ほどだ','ばかりだ','ところだ'],answer:0,explain:'【考点】た形＋ほうがいい＝アドバイス。「行ったほうがいい」＝行くべきだ。ない形の場合は「行かないほうがいい」。'},
    {type:'fill',grammar:'ばいい',sentence:'<ruby>分<rt>わ</rt></ruby>からないことがあったら、<ruby>先生<rt>せんせい</rt></ruby>に<ruby>聞<rt>き</rt></ruby>け＿＿＿＿。',options:['ばいい','たらいい','といい','てもいい'],answer:0,explain:'【考点】ば形＋いい＝～すればよい（アドバイス）。聞く→聞けば＋いい。'},
    {type:'fill',grammar:'ところだ',sentence:'これから<ruby>出<rt>で</rt></ruby>かける＿＿＿＿です。',options:['ところ','ばかり','まで','はず'],answer:0,explain:'【考点】辞書形＋ところだ＝これから～する直前。「出かける」前の状態。'}
  ]
}
};

/* ===== Build flat QUESTIONS array for backward compat ===== */
var QUESTIONS = [];
var dayKeys = Object.keys(DAILY_DATA);
dayKeys.forEach(function(dk) { DAILY_DATA[dk].questions.forEach(function(q){ QUESTIONS.push(q); }); });

/* ===== STATE ===== */
var st = JSON.parse(localStorage.getItem('n3_grammar_state') || '{}');
if (!st.correct) st.correct = 0;
if (!st.wrong) st.wrong = 0;
if (!st.answered) st.answered = {};
function saveSt() { localStorage.setItem('n3_grammar_state', JSON.stringify(st)); }

var currentQ = 0;
var qOrder = [];
var filterType = 'all';
var answered = false;
var currentDay = 'all';
var n3Wrong = [];

var app = document.getElementById('app');

function shuffle(arr) {
  for (var i = arr.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
}

function getQuestionsForDay(day) {
  if (day === 'all') return QUESTIONS;
  return DAILY_DATA[day] ? DAILY_DATA[day].questions : [];
}

function getGlobalIndex(q) {
  return QUESTIONS.indexOf(q);
}

function redoWrong() {
  qOrder = n3Wrong.slice();
  shuffle(qOrder);
  currentQ = 0; n3Wrong = []; answered = false;
  renderQuestion();
}

function startOldWrong() {
  var saved = JSON.parse(localStorage.getItem('n3_grammar_wrong') || '[]');
  var today = new Date().toISOString().slice(0,10);
  var old = saved.filter(function(q){return q.date < today;});
  if (old.length === 0) { alert('没有之前的错题~'); return; }
  qOrder = old.map(function(q){return q.idx;});
  shuffle(qOrder);
  currentQ = 0; n3Wrong = []; answered = false;
  localStorage.setItem('n3_grammar_wrong', JSON.stringify(saved.filter(function(q){return q.date >= today;})));
  renderQuestion();
}

function initQuiz() {
  answered = false;
  n3Wrong = [];
  qOrder = [];
  var pool = getQuestionsForDay(currentDay);
  for (var i = 0; i < QUESTIONS.length; i++) {
    if (pool.indexOf(QUESTIONS[i]) === -1) continue;
    if (filterType === 'all' || QUESTIONS[i].type === filterType) qOrder.push(i);
  }
  shuffle(qOrder);
  currentQ = 0;
  renderQuestion();
}

function selectDay(day) {
  currentDay = day;
  renderHome();
}

function renderDaySelector() {
  var html = '<div class="day-selector">';
  dayKeys.forEach(function(dk) {
    var d = DAILY_DATA[dk];
    var cls = currentDay === dk ? 'active' : '';
    html += '<div class="day-chip '+cls+'" onclick="selectDay(\''+dk+'\')">'+dk+'<br><span style="font-size:10px">'+d.title+'</span><br><span style="font-size:9px;color:#888">'+d.questions.length+'題</span></div>';
  });
  html += '<div class="day-chip '+(currentDay==='all'?'active':'')+'" onclick="selectDay(\'all\')">全部<br><span style="font-size:10px">混合模式</span><br><span style="font-size:9px;color:#888">'+QUESTIONS.length+'題</span></div>';
  html += '</div>';
  return html;
}

function renderGrammarPreview() {
  if (currentDay === 'all') return '';
  var d = DAILY_DATA[currentDay];
  if (!d) return '';
  var html = '<details style="background:#f0f4ff;border-radius:10px;padding:12px;margin-bottom:16px;border-left:4px solid #4361ee">';
  html += '<summary style="font-size:14px;font-weight:600;color:#4361ee;cursor:pointer">📋 '+d.title+'の文法要点（'+d.grammar.length+'個）▸</summary>';
  html += '<div style="margin-top:10px">';
  d.grammar.forEach(function(g) {
    html += '<div class="grammar-card">';
    html += '<strong>'+g.name+'</strong> — '+g.meaning+'<br>';
    html += '<span style="color:#333">💡 '+g.keyPoint+'</span><br>';
    html += '<span class="structure">📝 '+g.structure+'</span>';
    html += '</div>';
  });
  html += '</div></details>';
  return html;
}

function renderHome() {
  var total = st.correct + st.wrong;
  var rate = total ? Math.round(st.correct/total*100) : 0;
  var savedWrong = JSON.parse(localStorage.getItem('n3_grammar_wrong') || '[]');
  var today = new Date().toISOString().slice(0,10);
  var oldWrong = savedWrong.filter(function(q){return q.date < today;});
  var wrongBtn = oldWrong.length > 0 ? '<button class="btn btn-primary btn-block" style="background:#e74c3c;margin-bottom:12px" onclick="startOldWrong()">🔥 先复习之前的错题 ('+oldWrong.length+'题)</button>' : '';

  var poolSize = getQuestionsForDay(currentDay).length;

  app.innerHTML = wrongBtn +
    '<div class="card"><h2>📅 Day選択</h2>' + renderDaySelector() + '</div>' +
    '<div class="card"><h2>📊 <ruby>学習<rt>がくしゅう</rt></ruby>データ</h2>'+
    '<div class="stats-bar"><div class="stat"><div class="stat-num">'+st.correct+'</div><div class="stat-label">正解</div></div>'+
    '<div class="stat"><div class="stat-num">'+st.wrong+'</div><div class="stat-label">不正解</div></div>'+
    '<div class="stat"><div class="stat-num">'+rate+'%</div><div class="stat-label">正答率</div></div>'+
    '<div class="stat"><div class="stat-num">'+Object.keys(st.answered).length+'/'+QUESTIONS.length+'</div><div class="stat-label">進捗</div></div></div>'+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+Math.round(Object.keys(st.answered).length/QUESTIONS.length*100)+'%"></div></div></div>'+
    '<div class="card"><h2>🎯 '+(currentDay==='all'?'全部':currentDay)+' — '+poolSize+'題</h2>'+
    renderGrammarPreview() +
    '<div class="nav-types">'+
    '<button class="'+(filterType==='all'?'active':'')+'" onclick="filterType=\'all\';renderHome()">全部</button>'+
    '<button class="'+(filterType==='fill'?'active':'')+'" onclick="filterType=\'fill\';renderHome()"><span class="tag tag-fill">選択填空</span></button>'+
    '<button class="'+(filterType==='compare'?'active':'')+'" onclick="filterType=\'compare\';renderHome()"><span class="tag tag-compare">辨析対決</span></button>'+
    '<button class="'+(filterType==='judge'?'active':'')+'" onclick="filterType=\'judge\';renderHome()"><span class="tag tag-judge">正誤判断</span></button>'+
    '<button class="'+(filterType==='order'?'active':'')+'" onclick="filterType=\'order\';renderHome()"><span class="tag tag-order">排列組合</span></button>'+
    '</div>'+
    '<button class="btn btn-primary btn-block" onclick="initQuiz()">スタート！</button></div>';
}

function renderQuestion() {
  if (currentQ >= qOrder.length) {
    var _today = new Date().toISOString().slice(0,10);
    localStorage.setItem('task_done_n3grammar_' + _today, '1');
    if (n3Wrong.length > 0) {
      var saved = JSON.parse(localStorage.getItem('n3_grammar_wrong') || '[]');
      n3Wrong.forEach(function(idx) {
        var q = QUESTIONS[idx];
        if (!saved.find(function(s){return s.idx===idx;})) saved.push({idx:idx, grammar:q.grammar, date:_today});
      });
      localStorage.setItem('n3_grammar_wrong', JSON.stringify(saved));
    }
    var score = qOrder.length - n3Wrong.length;
    var pct = Math.round(score/qOrder.length*100);
    var html = '<div class="card"><h2>🎉 <ruby>完了<rt>かんりょう</rt></ruby>！</h2>';
    html += '<p style="font-size:24px;font-weight:bold;text-align:center">'+score+'/'+qOrder.length+'</p>';
    html += '<p style="text-align:center;color:#888">正确率 '+pct+'%</p>';
    html += '<button class="btn btn-primary btn-block" onclick="initQuiz()" style="margin-top:12px">📝 再来一轮</button>';
    if (n3Wrong.length > 0) {
      html += '<button class="btn btn-primary btn-block" style="background:#e74c3c;margin-top:8px" onclick="redoWrong()">🔄 重做错题 ('+n3Wrong.length+')</button>';
    }
    html += '<button class="btn btn-primary btn-block" onclick="renderHome()" style="margin-top:8px;background:#888">ホームへ</button></div>';
    app.innerHTML = html;
    return;
  }
  answered = false;
  var q = QUESTIONS[qOrder[currentQ]];
  var html = '<div class="card">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  html += '<span style="font-size:.8rem;color:#888;cursor:pointer" onclick="renderHome()">← 戻る　'+(currentQ+1)+' / '+qOrder.length+'</span>';
  var typeTag = {fill:'tag-fill',compare:'tag-compare',judge:'tag-judge',order:'tag-order'}[q.type];
  var typeName = {fill:'選択填空',compare:'辨析対決',judge:'正誤判断',order:'排列組合'}[q.type];
  html += '<span class="tag '+typeTag+'">'+typeName+'</span></div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:'+Math.round(currentQ/qOrder.length*100)+'%"></div></div>';
  html += '<p style="font-size:.75rem;color:#4361ee;margin:8px 0">文法：'+q.grammar+'</p>';

  if (q.type === 'fill') {
    html += '<div class="quiz-sentence">'+q.sentence+'</div>';
    html += '<div id="options">';
    q.options.forEach(function(o,i){
      html += '<button class="option-btn" onclick="checkFill('+i+','+q.answer+')" data-idx="'+i+'">'+String.fromCharCode(65+i)+'．'+o+'</button>';
    });
    html += '</div>';
  } else if (q.type === 'compare') {
    html += '<div class="quiz-sentence" style="font-size:1rem">'+q.question+'</div>';
    html += '<div id="options">';
    html += '<button class="option-btn" onclick="checkCompare(0,'+q.answer+')" data-idx="0">A．'+q.sentenceA+'</button>';
    html += '<button class="option-btn" onclick="checkCompare(1,'+q.answer+')" data-idx="1">B．'+q.sentenceB+'</button>';
    html += '</div>';
  } else if (q.type === 'judge') {
    html += '<div class="quiz-sentence">'+q.sentence+'</div>';
    html += '<p style="text-align:center;margin:8px 0;font-size:.9rem">この<ruby>文<rt>ぶん</rt></ruby>は<ruby>正<rt>ただ</rt></ruby>しいですか？</p>';
    html += '<div id="options" style="display:flex;gap:8px">';
    html += '<button class="option-btn" style="flex:1;text-align:center" onclick="checkJudge(true,'+q.correct+')" data-idx="0">⭕ 正しい</button>';
    html += '<button class="option-btn" style="flex:1;text-align:center" onclick="checkJudge(false,'+q.correct+')" data-idx="1">❌ 間違い</button>';
    html += '</div>';
  } else if (q.type === 'order') {
    var shuffled = q.words.slice();
    shuffle(shuffled);
    html += '<p style="font-size:.9rem;margin:8px 0"><ruby>正<rt>ただ</rt></ruby>しい<ruby>順序<rt>じゅんじょ</rt></ruby>に<ruby>並<rt>なら</rt></ruby>べてください：</p>';
    html += '<div class="order-area" id="orderResult"></div>';
    html += '<div id="orderWords">';
    shuffled.forEach(function(w){
      html += '<span class="order-word" onclick="toggleOrderWord(this)">'+w+'</span>';
    });
    html += '</div>';
    html += '<button class="btn btn-primary btn-block" id="orderCheck" onclick="checkOrder()" style="margin-top:12px">チェック ✓</button>';
  }
  html += '<div id="result"></div></div>';
  app.innerHTML = html;
}

var selectedOrder = [];
function toggleOrderWord(el) {
  if (answered) return;
  if (el.classList.contains('selected')) {
    el.classList.remove('selected');
    selectedOrder = selectedOrder.filter(function(w){return w!==el.textContent;});
  } else {
    el.classList.add('selected');
    selectedOrder.push(el.textContent);
  }
  document.getElementById('orderResult').textContent = selectedOrder.join(' ');
}

function showResult(isCorrect, q) {
  answered = true;
  st.answered[qOrder[currentQ]] = true;
  if (isCorrect) st.correct++;
  else { st.wrong++; n3Wrong.push(qOrder[currentQ]); }
  saveSt();
  var html = '<div class="'+(isCorrect?'result-correct':'result-wrong')+'">';
  html += isCorrect ? '✅ 正解！' : '❌ 不正解…';
  html += '</div><div class="explanation">'+q.explain+'</div>';
  html += '<button class="btn btn-primary btn-block" onclick="currentQ++;renderQuestion()" style="margin-top:12px">次の問題 →</button>';
  document.getElementById('result').innerHTML = html;
}

function checkFill(sel, correct) {
  if (answered) return;
  var btns = document.querySelectorAll('#options .option-btn');
  btns[correct].classList.add('correct');
  if (sel !== correct) btns[sel].classList.add('wrong');
  showResult(sel===correct, QUESTIONS[qOrder[currentQ]]);
}

function checkCompare(sel, correct) {
  if (answered) return;
  var btns = document.querySelectorAll('#options .option-btn');
  btns[correct].classList.add('correct');
  if (sel !== correct) btns[sel].classList.add('wrong');
  showResult(sel===correct, QUESTIONS[qOrder[currentQ]]);
}

function checkJudge(sel, correct) {
  if (answered) return;
  var btns = document.querySelectorAll('#options .option-btn');
  if (correct) btns[0].classList.add('correct'); else btns[1].classList.add('correct');
  if (sel !== correct) { if (sel) btns[0].classList.add('wrong'); else btns[1].classList.add('wrong'); }
  showResult(sel===correct, QUESTIONS[qOrder[currentQ]]);
}

function checkOrder() {
  if (answered) return;
  var q = QUESTIONS[qOrder[currentQ]];
  var userAnswer = selectedOrder.join(' ');
  var isCorrect = userAnswer === q.correct;
  document.getElementById('orderCheck').classList.add('hidden');
  showResult(isCorrect, q);
  if (!isCorrect) {
    document.getElementById('orderResult').innerHTML = '<span style="color:#ef476f;text-decoration:line-through">'+userAnswer+'</span><br><span style="color:#06d6a0">正解：'+q.correct+'</span>';
  }
}

renderHome();

// ============ 跨设备同步 ============
function exportData() {
  var keys = Object.keys(localStorage), data = {};
  keys.forEach(function(k) { try { data[k] = JSON.parse(localStorage.getItem(k)); } catch(e) { data[k] = localStorage.getItem(k); } });
  var json = JSON.stringify(data);
  try { navigator.clipboard.writeText(json).then(function() { alert("✅ 已复制！在其他设备首页粘贴导入"); }); }
  catch(e) { prompt("请手动复制以下数据：", json); }
}
